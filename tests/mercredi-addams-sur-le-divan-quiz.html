<html lang="fr">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qui êtes-vous chez les Addams ?</title>
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://ouipsycho.fr/articles/mercredi-addams-sur-le-divan/">
  <meta name="description" content="Mercredi, Morticia, Gomez, Fester ou la Chose : découvrez quel membre de la famille Addams sommeille en vous.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: linear-gradient(170deg, #100c16 0%, #241a33 60%, #2e2140 100%);
      color: #efe9f4;
      padding: 24px 16px;
      min-height: 100vh;
    }
    .quiz-container { max-width: 620px; margin: 0 auto; }
    .quiz-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(183,156,232,0.25);
      border-radius: 14px;
      padding: 28px 24px;
    }
    h1 { font-size: 1.35rem; line-height: 1.35; margin-bottom: 10px; color: #b79ce8; letter-spacing: .02em; }
    .intro { font-size: 0.98rem; line-height: 1.55; color: #d8cfe6; margin-bottom: 20px; }
    .btn {
      display: inline-block;
      background: #b79ce8;
      color: #17101f;
      border: none;
      border-radius: 8px;
      padding: 13px 26px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.45); }
    .progress-wrap { background: rgba(255,255,255,0.1); border-radius: 99px; height: 8px; margin-bottom: 18px; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #b79ce8, #7e5fc0); height: 100%; width: 0; border-radius: 99px; transition: width .3s ease; }
    .q-count { font-size: 0.8rem; color: #a394bd; margin-bottom: 8px; letter-spacing: .08em; text-transform: uppercase; }
    .question { font-size: 1.12rem; font-weight: 700; line-height: 1.45; margin-bottom: 18px; }
    .answers { display: flex; flex-direction: column; gap: 10px; }
    .answer {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(183,156,232,0.3);
      border-radius: 10px;
      padding: 13px 16px;
      font-family: inherit;
      font-size: 0.96rem;
      line-height: 1.45;
      color: #efe9f4;
      text-align: left;
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease, transform .1s ease;
      width: 100%;
    }
    .answer:hover { background: rgba(183,156,232,0.22); border-color: #b79ce8; transform: translateX(3px); }
    .result-emoji { font-size: 3rem; text-align: center; margin-bottom: 6px; }
    .result-title { font-size: 1.4rem; font-weight: 800; text-align: center; color: #b79ce8; margin-bottom: 14px; }
    .result-text { font-size: 0.99rem; line-height: 1.6; color: #e6def2; margin-bottom: 20px; }
    .share { text-align: center; margin: 18px 0 8px; }
    .share p { font-size: .9rem; color: #a394bd; margin-bottom: 10px; }
    .share a {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(183,156,232,0.3);
      color: #efe9f4;
      text-decoration: none;
      border-radius: 8px;
      padding: 9px 14px;
      margin: 0 4px 8px;
      font-size: .9rem;
      transition: background .15s ease;
    }
    .share a:hover { background: rgba(183,156,232,0.25); }
    .disclaimer {
      background: rgba(0,0,0,0.35);
      border-left: 4px solid #b79ce8;
      border-radius: 6px;
      padding: 12px 14px;
      font-size: 0.84rem;
      line-height: 1.5;
      color: #cfc4de;
      margin-top: 18px;
    }
    .restart { text-align: center; margin-top: 18px; }
    .center { text-align: center; }
  </style>
</head>
<body>
  <div class="quiz-container">
    <div class="quiz-card" id="app"></div>
  </div>

  <script>
    var QUESTIONS = [
      {
        q: "On vous invite à une fête surprise organisée en votre honneur.",
        a: [
          { t: "Vous repartez immédiatement. La surprise, c'est votre absence.", p: "A" },
          { t: "Vous traversez la pièce lentement : la fête s'organise autour de vous.", p: "B" },
          { t: "Vous dansez le tango sur la table avant même le gâteau.", p: "C" },
          { t: "Vous testez si les bougies d'anniversaire font de belles explosions.", p: "D" },
          { t: "Vous avez tout organisé en coulisses. Personne ne le saura.", p: "E" }
        ]
      },
      {
        q: "Votre façon de dire « je t'aime » ?",
        a: [
          { t: "Je ne le dis pas. Je menace ceux qui vous menacent, nuance.", p: "A" },
          { t: "Un regard suffit. Les mots abîment ce genre de choses.", p: "B" },
          { t: "En trois langues, à genoux, avec des roses — sans les fleurs, juste les tiges.", p: "C" },
          { t: "Je partage mes ampoules électriques préférées. C'est intime.", p: "D" },
          { t: "Un geste discret au bon moment. Toujours là, jamais vu.", p: "E" }
        ]
      },
      {
        q: "Un collègue s'attribue votre travail en réunion.",
        a: [
          { t: "Vengeance froide, documentée, servie dans six mois exactement.", p: "A" },
          { t: "Un haussement de sourcil. Il transpire déjà.", p: "B" },
          { t: "Vous éclatez de rire et le félicitez si fort que tout le monde comprend.", p: "C" },
          { t: "Vous proposez de régler ça au détecteur de mensonges fait maison.", p: "D" },
          { t: "Vous glissez la preuve dans la boîte mail du patron. Anonymement.", p: "E" }
        ]
      },
      {
        q: "Votre dimanche idéal ?",
        a: [
          { t: "Écrire, seule, pendant que la pluie fouette les carreaux.", p: "A" },
          { t: "Tailler les roses. Enfin, garder les tiges et jeter les fleurs.", p: "B" },
          { t: "Un duel à l'épée avant le brunch, pour ouvrir l'appétit.", p: "C" },
          { t: "Tester une nouvelle expérience. Le garage s'en remettra.", p: "D" },
          { t: "Ranger, réparer, aider — pendant que tout le monde dort.", p: "E" }
        ]
      },
      {
        q: "Ce que les gens disent de vous dans votre dos ?",
        a: [
          { t: "« Elle fait peur. » Compliment accepté.", p: "A" },
          { t: "« On dirait qu'elle sait quelque chose qu'on ignore. » Exact.", p: "B" },
          { t: "« Il est épuisant. » Épuisant de passion, oui.", p: "C" },
          { t: "« Complètement à l'ouest. » L'ouest est sous-coté.", p: "D" },
          { t: "Rien. Ils ne remarquent jamais que vous étiez là.", p: "E" }
        ]
      },
      {
        q: "Votre rapport aux conventions sociales ?",
        a: [
          { t: "Je les observe comme un entomologiste observe des insectes.", p: "A" },
          { t: "Je les surplombe avec élégance. Elles ne m'atteignent pas.", p: "B" },
          { t: "Je les embrasse trop fort, elles finissent par céder.", p: "C" },
          { t: "Les quoi ?", p: "D" },
          { t: "Je les respecte en apparence. En apparence.", p: "E" }
        ]
      },
      {
        q: "Face à une mauvaise nouvelle, votre premier réflexe ?",
        a: [
          { t: "Analyser froidement. Les émotions attendront leur tour, comme tout le monde.", p: "A" },
          { t: "Respirer, redresser le menton, protéger les miens.", p: "B" },
          { t: "Pleurer magnifiquement, puis proposer un plan grandiose.", p: "C" },
          { t: "Chercher le bon côté. Il y a toujours un bon côté explosif.", p: "D" },
          { t: "Régler discrètement le problème avant que les autres ne l'apprennent.", p: "E" }
        ]
      },
      {
        q: "Votre devise personnelle ?",
        a: [
          { t: "« Je ne suis pas bizarre. Vous êtes ordinaires. »", p: "A" },
          { t: "« Le calme est la forme la plus pure du pouvoir. »", p: "B" },
          { t: "« Vivre fort, aimer plus fort encore. »", p: "C" },
          { t: "« Pourquoi faire simple quand on peut faire étrange ? »", p: "D" },
          { t: "« Être indispensable, jamais visible. »", p: "E" }
        ]
      }
    ];

    var PROFILES = {
      A: {
        emoji: "🖤",
        title: "Mercredi — la lucidité tranchante",
        text: "Vous voyez le monde tel qu'il est, sans le filtre rose que les autres appellent politesse. Votre franchise déstabilise, votre indépendance impressionne, et votre loyauté — bien réelle — ne s'achète pas avec des sourires. Comme Mercredi, vous refusez le travail émotionnel qu'on impose surtout aux filles : rassurer, adoucir, plaire. C'est une force. Veillez juste à laisser une porte entrouverte : la lucidité n'oblige pas à la solitude, et certains humains méritent (presque) votre confiance."
      },
      B: {
        emoji: "🥀",
        title: "Morticia — le magnétisme tranquille",
        text: "Vous n'élevez jamais la voix : vous n'en avez pas besoin. Votre calme est une gravité autour de laquelle les autres orbitent. Comme Morticia, vous alliez douceur et autorité, sensualité et sang-froid, et vous aimez sans jamais chercher à transformer l'autre. Les psychologues y verraient une sécurité intérieure rare. Votre point de vigilance : à force de tout absorber avec élégance, vous oubliez parfois de dire quand quelque chose vous blesse. Même les roses noires ont des épines — utilisez-les."
      },
      C: {
        emoji: "🌹",
        title: "Gomez — la passion volcanique",
        text: "Vous vivez tout à 200 % : l'amour, l'amitié, les hobbies improbables. Votre enthousiasme est contagieux, votre générosité sans calcul, et votre couple (ou vos amitiés) carbure à l'admiration mutuelle plutôt qu'à l'usure. Comme Gomez, vous prouvez qu'on peut être intense sans être toxique : vous célébrez l'autre au lieu de le contrôler. Votre défi : accepter que tout le monde ne fonctionne pas à votre voltage, et que le calme des autres n'est pas un rejet. Parfois, un simple mardi peut rester un simple mardi."
      },
      D: {
        emoji: "💡",
        title: "Fester — l'excentricité joyeuse",
        text: "Vous êtes l'électron libre de la famille — parfois littéralement. Votre créativité ignore les modes d'emploi, votre humour désamorce les drames, et votre regard décalé trouve des solutions que personne n'avait vues. Comme Fester, vous rappelez que la bizarrerie assumée est une forme de liberté, pas un défaut à corriger. Votre vigilance : derrière la fantaisie se cache parfois le sentiment d'être « trop » ou « à part ». Entourez-vous de gens qui branchent votre ampoule au lieu de la dévisser."
      },
      E: {
        emoji: "🖐️",
        title: "La Chose — l'indispensable discret",
        text: "Vous êtes celui ou celle qui fait tenir l'ensemble : toujours là, rarement remercié, jamais dans la lumière. Votre intelligence pratique règle les problèmes avant même qu'on les remarque, et votre loyauté est totale. Comme la Chose, vous prouvez qu'on n'a pas besoin de grands discours pour compter énormément. Mais attention au piège du dévouement invisible : à force d'aider en silence, on finit par croire que vous n'avez besoin de rien. Réclamez votre part de reconnaissance — d'une main ferme."
      }
    };

    var current = 0;
    var votes = { A: 0, B: 0, C: 0, D: 0, E: 0 };
    var app = document.getElementById('app');
    var PAGE_URL = "https://ouipsycho.fr/articles/mercredi-addams-sur-le-divan/";

    function notifyResize() {
      setTimeout(function() {
        window.parent.postMessage({ type: 'quiz-resize', height: document.body.scrollHeight }, '*');
      }, 50);
    }

    function shuffle(arr) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
      }
      return a;
    }

    function esc(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function renderStart() {
      current = 0;
      votes = { A: 0, B: 0, C: 0, D: 0, E: 0 };
      app.innerHTML =
        '<h1>🕸️ Qui êtes-vous chez les Addams ?</h1>' +
        '<p class="intro">Mercredi lucide, Morticia magnétique, Gomez volcanique, Fester lunaire ou Chose discrète mais indispensable : 8 questions pour découvrir quel membre du clan sommeille en vous. Le manoir vous ouvre ses portes — elles grincent, c\'est normal.</p>' +
        '<div class="center"><button class="btn" onclick="renderQuestion()">Entrer dans le manoir 🚪</button></div>';
      notifyResize();
    }

    function renderQuestion() {
      var q = QUESTIONS[current];
      var answers = shuffle(q.a);
      var pct = Math.round((current / QUESTIONS.length) * 100);
      var html =
        '<div class="progress-wrap"><div class="progress-bar" style="width:' + pct + '%"></div></div>' +
        '<div class="q-count">Question ' + (current + 1) + ' / ' + QUESTIONS.length + '</div>' +
        '<div class="question">' + esc(q.q) + '</div>' +
        '<div class="answers">';
      answers.forEach(function(ans) {
        html += '<button class="answer" onclick="pick(\'' + ans.p + '\')">' + esc(ans.t) + '</button>';
      });
      html += '</div>';
      app.innerHTML = html;
      notifyResize();
    }

    function pick(profile) {
      votes[profile]++;
      current++;
      if (current < QUESTIONS.length) {
        renderQuestion();
      } else {
        renderResult();
      }
    }

    function renderResult() {
      var best = 'A';
      ['B', 'C', 'D', 'E'].forEach(function(k) { if (votes[k] > votes[best]) best = k; });
      var p = PROFILES[best];
      var shareText = 'J\'ai fait le test « Qui êtes-vous chez les Addams ? » sur Oui Psycho! et je suis… ' + p.title.split(' — ')[0] + ' ' + p.emoji;
      var encodedUrl = encodeURIComponent(PAGE_URL);
      var encodedText = encodeURIComponent(shareText);
      var encodedTextUrl = encodeURIComponent(shareText + ' ' + PAGE_URL);

      app.innerHTML =
        '<div class="progress-wrap"><div class="progress-bar" style="width:100%"></div></div>' +
        '<div class="result-emoji">' + p.emoji + '</div>' +
        '<div class="result-title">' + esc(p.title) + '</div>' +
        '<p class="result-text">' + esc(p.text) + '</p>' +
        '<div class="share">' +
          '<p>Partagez votre profil Addams :</p>' +
          '<a href="https://www.facebook.com/sharer/sharer.php?u=' + encodedUrl + '" target="_blank" rel="noopener">👍 Facebook</a>' +
          '<a href="https://twitter.com/intent/tweet?text=' + encodedText + '&url=' + encodedUrl + '" target="_blank" rel="noopener">🐦 Twitter</a>' +
          '<a href="https://wa.me/?text=' + encodedTextUrl + '" target="_blank" rel="noopener">💬 WhatsApp</a>' +
        '</div>' +
        '<div class="disclaimer">⚕️ <strong>Rappel important :</strong> Ce questionnaire est un outil de réflexion, pas un diagnostic. Seul un professionnel de santé peut évaluer votre situation. En cas de détresse, appelez le <strong>3114</strong> (gratuit, 24h/24).</div>' +
        '<div class="restart"><button class="btn" onclick="renderStart()">🔄 Recommencer</button></div>';
      notifyResize();
    }

    renderStart();
    window.addEventListener('load', notifyResize);
  </script>
</body>
</html>
