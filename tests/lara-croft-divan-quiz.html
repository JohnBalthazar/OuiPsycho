<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quel genre de Lara Croft etes-vous ?</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:#3a322e;background:transparent;line-height:1.55}
  .quiz{max-width:560px;margin:0 auto;background:#fff7f2;border:1px solid #f0ddd0;border-radius:16px;padding:26px 24px}
  .progress{height:8px;background:#f1e2d8;border-radius:99px;overflow:hidden;margin-bottom:22px}
  .progress > span{display:block;height:100%;width:0;background:linear-gradient(90deg,#e8a07d,#d97a55);border-radius:99px;transition:width .35s ease}
  .step-info{font-size:.82rem;letter-spacing:.04em;text-transform:uppercase;color:#b08368;margin-bottom:10px;font-weight:600}
  h2{font-size:1.28rem;line-height:1.35;margin-bottom:20px;color:#5a3d2e}
  .opt{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid #ecd9cc;color:#3a322e;border-radius:12px;padding:14px 16px;margin-bottom:11px;font-size:1rem;cursor:pointer;transition:all .18s ease}
  .opt:hover{border-color:#d97a55;background:#fdeee5;transform:translateY(-1px)}
  .intro p,.result p{margin-bottom:16px}
  .intro{text-align:center}
  .emoji{font-size:2.6rem;display:block;margin-bottom:12px}
  .btn{display:inline-block;background:#d97a55;color:#fff;border:none;border-radius:99px;padding:13px 28px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .18s ease}
  .btn:hover{background:#c9683f}
  .result{text-align:center}
  .result .tag{display:inline-block;background:#fbe6da;color:#b35a35;border-radius:99px;padding:5px 14px;font-size:.8rem;font-weight:700;letter-spacing:.03em;text-transform:uppercase;margin-bottom:14px}
  .result h2{margin-bottom:14px}
  .result .desc{text-align:left;background:#fff;border:1px solid #f0ddd0;border-radius:12px;padding:18px;margin-bottom:20px}
  .restart{margin-top:6px;background:none;border:none;color:#b08368;font-size:.92rem;cursor:pointer;text-decoration:underline}
  .restart:hover{color:#d97a55}
</style>
</head>
<body>
<div class="quiz" id="quiz"></div>
<script>
(function(){
  var questions=[
    {q:"Un temple oublie se dresse devant vous. Votre premier reflexe ?",
     a:[{t:"Foncer a l'interieur, on verra bien.",p:"A"},
        {t:"Etudier les plans et les inscriptions avant d'entrer.",p:"B"},
        {t:"Y aller seule, sans prevenir personne.",p:"C"},
        {t:"Verifier d'abord que tout le monde est en securite.",p:"D"}]},
    {q:"Votre idee des vacances parfaites ?",
     a:[{t:"Saut en parachute au-dessus d'un volcan.",p:"A"},
        {t:"Une expo d'archeologie et un bon livre.",p:"B"},
        {t:"Une cabane isolee, loin de tout et de tous.",p:"C"},
        {t:"Un grand week-end avec les gens que vous aimez.",p:"D"}]},
    {q:"Face a un imprevu, vous etes plutot...",
     a:[{t:"Action immediate : l'instinct d'abord.",p:"A"},
        {t:"Plan B, plan C, plan D deja prets.",p:"B"},
        {t:"Vous gerez seule, sans demander d'aide.",p:"C"},
        {t:"Vous reunissez tout le monde pour decider ensemble.",p:"D"}]},
    {q:"Ce qui vous fait vraiment vibrer ?",
     a:[{t:"L'adrenaline et le depassement de soi.",p:"A"},
        {t:"Resoudre une enigme que personne ne comprend.",p:"B"},
        {t:"Votre liberte, sans comptes a rendre.",p:"C"},
        {t:"Aider quelqu'un et voir son sourire.",p:"D"}]},
    {q:"Votre plus grande qualite, soyons honnetes ?",
     a:[{t:"Le courage (un peu trop, parfois).",p:"A"},
        {t:"La logique imparable.",p:"B"},
        {t:"L'autonomie totale.",p:"C"},
        {t:"L'empathie sans limites.",p:"D"}]},
    {q:"Et votre petit defaut, alors ?",
     a:[{t:"Vous foncez avant de reflechir.",p:"A"},
        {t:"Vous sur-analysez absolument tout.",p:"B"},
        {t:"Vous avez du mal a demander de l'aide.",p:"C"},
        {t:"Vous vous oubliez pour les autres.",p:"D"}]}
  ];
  var profiles={
    A:{emoji:"\u26A1",tag:"Profil A",name:"L'Exploratrice intrepide",
       desc:"Vous etes la Lara des grands sauts. Le danger vous galvanise et l'action est votre langue maternelle. Votre courage est contagieux, mais pensez parfois a regarder ou vous mettez les pieds : la plus belle des aventurieres a aussi le droit de souffler."},
    B:{emoji:"\uD83E\uDDE9",tag:"Profil B",name:"La Cerebrale stratege",
       desc:"Vous etes la Lara qui dechiffre les enigmes la ou les autres tirent au pistolet. Calme, methodique, redoutablement futee, vous voyez trois coups a l'avance. Votre defi : accepter qu'on ne puisse pas tout planifier, et laisser un peu de place a l'imprevu."},
    C:{emoji:"\uD83C\uDF11",tag:"Profil C",name:"L'Ame independante",
       desc:"Vous etes la Lara solitaire, libre comme l'air et autosuffisante. Vous avancez seule, et vous le faites bien. Mais souvenez-vous : demander de l'aide n'est pas une faiblesse, c'est une autre forme de courage. Laissez parfois quelqu'un porter le sac a dos."},
    D:{emoji:"\u2764\uFE0F",tag:"Profil D",name:"La Protectrice au grand coeur",
       desc:"Vous etes la Lara qui sauve d'abord les autres. Empathique, loyale, rassembleuse, vous transformez chaque expedition en aventure collective. Votre mission secrete : penser un peu plus a vous. On ne protege bien les autres qu'en prenant soin de soi."}
  };

  var box=document.getElementById('quiz');
  var step=-1; var answers=[];

  function notifyResize(){
    setTimeout(function(){
      window.parent.postMessage({type:'quiz-resize',height:document.body.scrollHeight},'*');
    },50);
  }

  function renderIntro(){
    box.innerHTML='<div class="intro"><span class="emoji">\uD83C\uDFFA</span>'+
      '<h2>Quel genre de Lara Croft etes-vous ?</h2>'+
      '<p>Six questions pour reveler l\'aventuriere qui sommeille en vous. Repondez spontanement, sans trop reflechir.</p>'+
      '<button class="btn" id="start">Commencer l\'expedition</button></div>';
    document.getElementById('start').onclick=function(){step=0;answers=[];renderQ();};
    notifyResize();
  }

  function renderQ(){
    var item=questions[step];
    var pct=Math.round((step/questions.length)*100);
    var html='<div class="progress"><span style="width:'+pct+'%"></span></div>'+
      '<div class="step-info">Question '+(step+1)+' / '+questions.length+'</div>'+
      '<h2>'+item.q+'</h2>';
    for(var i=0;i<item.a.length;i++){
      html+='<button class="opt" data-p="'+item.a[i].p+'">'+item.a[i].t+'</button>';
    }
    box.innerHTML=html;
    var opts=box.querySelectorAll('.opt');
    for(var j=0;j<opts.length;j++){
      opts[j].onclick=function(){
        answers.push(this.getAttribute('data-p'));
        step++;
        if(step<questions.length){renderQ();}else{renderResult();}
      };
    }
    notifyResize();
  }

  function renderResult(){
    var counts={A:0,B:0,C:0,D:0};
    for(var i=0;i<answers.length;i++){counts[answers[i]]++;}
    var best='A',max=-1,order=['A','B','C','D'];
    for(var k=0;k<order.length;k++){if(counts[order[k]]>max){max=counts[order[k]];best=order[k];}}
    var p=profiles[best];
    box.innerHTML='<div class="result">'+
      '<div class="progress"><span style="width:100%"></span></div>'+
      '<span class="emoji">'+p.emoji+'</span>'+
      '<span class="tag">'+p.tag+'</span>'+
      '<h2>'+p.name+'</h2>'+
      '<div class="desc">'+p.desc+'</div>'+
      '<button class="restart" id="again">Refaire le test</button></div>';
    document.getElementById('again').onclick=renderIntro;
    notifyResize();
  }

  renderIntro();
  window.addEventListener('load',notifyResize);
})();
</script>
</body>
</html>
