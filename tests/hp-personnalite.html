<title>Quel personnage Harry Potter êtes-vous ?</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple-50: #EEEDFE;
    --purple-200: #AFA9EC;
    --purple-400: #7F77DD;
    --purple-600: #534AB7;
    --purple-800: #3C3489;
    --purple-900: #26215C;
    --teal-50: #E1F5EE;
    --teal-200: #5DCAA5;
    --teal-800: #085041;
    --amber-50: #FAEEDA;
    --amber-200: #FAC775;
    --amber-800: #633806;
    --blue-50: #E6F1FB;
    --blue-200: #85B7EB;
    --blue-800: #0C447C;
    --gray-50: #F1EFE8;
    --gray-200: #B4B2A9;
    --gray-800: #444441;
    --green-50: #EAF3DE;
    --green-200: #C0DD97;
    --green-800: #27500A;
    --radius-md: 8px;
    --radius-lg: 12px;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --border: rgba(0,0,0,0.12);
    --border-hover: rgba(0,0,0,0.25);
    --bg: #ffffff;
    --bg-secondary: #f7f6f3;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    padding: 2rem 1.5rem 3rem;
    max-width: 640px;
    margin: 0 auto;
  }

  .header { text-align: center; margin-bottom: 2rem; }
  .header-badge {
    display: inline-block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--purple-600);
    background: var(--purple-50);
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 0.75rem;
  }
  .header h1 { font-size: 20px; font-weight: 500; color: var(--text); line-height: 1.4; }

  .progress-wrap { margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
  .progress-label { font-size: 12px; color: var(--text-muted); }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 1.75rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--purple-400); border-radius: 2px; transition: width 0.35s ease; }

  .question { font-size: 17px; font-weight: 500; color: var(--text); margin-bottom: 1.25rem; line-height: 1.55; }

  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.75rem; }
  .option {
    background: var(--bg);
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius-lg);
    padding: 13px 16px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
    font-family: inherit;
    line-height: 1.5;
  }
  .option:hover { border-color: var(--purple-400); background: var(--purple-50); }
  .option.selected { border: 2px solid var(--purple-600); background: var(--purple-50); color: var(--purple-900); font-weight: 500; }

  .nav { display: flex; justify-content: space-between; align-items: center; }
  .btn {
    background: transparent;
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius-md);
    padding: 9px 20px;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--bg-secondary); }
  .btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
  .btn-primary { background: var(--purple-600); color: #fff; border-color: var(--purple-600); }
  .btn-primary:hover { background: var(--purple-800); }

  .result { animation: fadeUp 0.4s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-avatar { width: 68px; height: 68px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 1rem; }
  .result-name { font-size: 22px; font-weight: 500; text-align: center; margin-bottom: 0.2rem; }
  .result-tagline { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 1.25rem; }
  .traits { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-bottom: 1.5rem; }
  .trait { font-size: 12px; padding: 4px 12px; border-radius: 20px; }
  .result-desc { font-size: 15px; line-height: 1.75; margin-bottom: 1.25rem; color: var(--text); }

  .psy-block { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 14px 18px; margin-bottom: 1.75rem; }
  .psy-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 6px; }
  .psy-text { font-size: 14px; line-height: 1.65; color: var(--text); }

  .scores-title { font-size: 13px; color: var(--text-muted); margin-bottom: 0.75rem; }
  .score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .score-name { font-size: 13px; color: var(--text-muted); width: 85px; flex-shrink: 0; }
  .score-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 3px; transition: width 0.7s ease; }
  .score-pct { font-size: 12px; color: var(--text-muted); min-width: 34px; text-align: right; }

  .restart-wrap { text-align: center; margin-top: 2rem; }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">Test de personnalité</div>
  <h1>Quel personnage de Harry Potter êtes-vous&nbsp;?</h1>
</div>

<div id="root"></div>

<script>
const questions = [
  {
    text: "Face à un problème difficile, votre premier réflexe est…",
    options: [
      { text: "Foncer — on verra en chemin.", scores: { harry:3, ron:1, hermione:0, dumbledore:0, rogue:0, luna:0 } },
      { text: "Chercher quelqu'un de confiance pour en parler.", scores: { harry:0, ron:3, hermione:0, dumbledore:0, rogue:0, luna:1 } },
      { text: "Aller chercher l'information — livres, articles, experts.", scores: { harry:0, ron:0, hermione:3, dumbledore:1, rogue:1, luna:0 } },
      { text: "Prendre du recul et observer avant d'agir.", scores: { harry:0, ron:0, hermione:0, dumbledore:3, rogue:2, luna:2 } }
    ]
  },
  {
    text: "On vous demande comment vous allez. Vous répondez…",
    options: [
      { text: "« Bien, merci. » — même si ce n'est pas vrai.", scores: { harry:3, ron:1, hermione:1, dumbledore:0, rogue:2, luna:0 } },
      { text: "Honnêtement, avec quelques détails.", scores: { harry:0, ron:3, hermione:1, dumbledore:0, rogue:0, luna:2 } },
      { text: "Vous répondez à la question par une autre question.", scores: { harry:0, ron:0, hermione:2, dumbledore:3, rogue:1, luna:1 } },
      { text: "La vérité, sans filtre — les gens demandent, ils ont ce qu'ils veulent.", scores: { harry:0, ron:0, hermione:0, dumbledore:0, rogue:3, luna:3 } }
    ]
  },
  {
    text: "Dans un groupe, vous êtes plutôt…",
    options: [
      { text: "Celui·celle qu'on suit sans trop savoir pourquoi.", scores: { harry:3, ron:0, hermione:0, dumbledore:2, rogue:0, luna:0 } },
      { text: "Celui·celle qui met l'ambiance et fait rire.", scores: { harry:0, ron:3, hermione:0, dumbledore:0, rogue:0, luna:1 } },
      { text: "Celui·celle qui a déjà la solution avant que tout le monde ait fini de poser la question.", scores: { harry:0, ron:0, hermione:3, dumbledore:1, rogue:1, luna:0 } },
      { text: "Celui·celle qui observe depuis le bord — et quand il·elle parle, ça compte.", scores: { harry:0, ron:0, hermione:0, dumbledore:3, rogue:2, luna:3 } }
    ]
  },
  {
    text: "Votre plus grande peur inavouée est probablement…",
    options: [
      { text: "Ne pas être à la hauteur de ce qu'on attend de vous.", scores: { harry:3, ron:2, hermione:1, dumbledore:0, rogue:0, luna:0 } },
      { text: "Être invisible, passer inaperçu·e.", scores: { harry:0, ron:3, hermione:0, dumbledore:0, rogue:1, luna:0 } },
      { text: "Échouer après avoir tout donné.", scores: { harry:1, ron:0, hermione:3, dumbledore:0, rogue:2, luna:0 } },
      { text: "Perdre quelqu'un à cause de vos propres erreurs.", scores: { harry:0, ron:0, hermione:0, dumbledore:3, rogue:3, luna:0 } },
      { text: "Que le monde soit encore plus étrange que vous ne le pensiez.", scores: { harry:0, ron:0, hermione:0, dumbledore:0, rogue:0, luna:3 } }
    ]
  },
  {
    text: "Quelqu'un vous a blessé·e profondément. Vous…",
    options: [
      { text: "Continuez comme si de rien n'était — tant que ça avance.", scores: { harry:3, ron:0, hermione:0, dumbledore:0, rogue:1, luna:0 } },
      { text: "Vous éloignez, puis revenez quand ça va mieux.", scores: { harry:0, ron:3, hermione:0, dumbledore:0, rogue:0, luna:1 } },
      { text: "Analysez la situation pour comprendre ce qui s'est passé.", scores: { harry:0, ron:0, hermione:3, dumbledore:2, rogue:1, luna:1 } },
      { text: "Gardez la blessure longtemps, sans le montrer.", scores: { harry:1, ron:0, hermione:0, dumbledore:1, rogue:3, luna:0 } },
      { text: "Pardonnez assez facilement — la rancœur, ça fatigue.", scores: { harry:0, ron:1, hermione:0, dumbledore:3, rogue:0, luna:3 } }
    ]
  },
  {
    text: "Ce qui vous donne le plus d'énergie dans une journée…",
    options: [
      { text: "Agir, résoudre, avancer — rester en mouvement.", scores: { harry:3, ron:1, hermione:1, dumbledore:0, rogue:0, luna:0 } },
      { text: "Rire avec des gens que vous aimez.", scores: { harry:0, ron:3, hermione:0, dumbledore:0, rogue:0, luna:1 } },
      { text: "Apprendre quelque chose de nouveau.", scores: { harry:0, ron:0, hermione:3, dumbledore:2, rogue:1, luna:2 } },
      { text: "Un moment de calme et de réflexion, seul·e.", scores: { harry:0, ron:0, hermione:0, dumbledore:3, rogue:3, luna:2 } }
    ]
  },
  {
    text: "On vous confie un secret important. Vous…",
    options: [
      { text: "Le gardez — mais il vous pèse.", scores: { harry:3, ron:1, hermione:1, dumbledore:3, rogue:2, luna:0 } },
      { text: "Le partagez avec une personne de confiance, juste une.", scores: { harry:0, ron:3, hermione:1, dumbledore:0, rogue:0, luna:0 } },
      { text: "Le gardez et commencez à creuser pour comprendre pourquoi on vous l'a dit.", scores: { harry:0, ron:0, hermione:3, dumbledore:1, rogue:1, luna:0 } },
      { text: "Le tenez sans y penser — les secrets ne vous affectent pas vraiment.", scores: { harry:0, ron:0, hermione:0, dumbledore:0, rogue:1, luna:3 } }
    ]
  },
  {
    text: "La phrase qui vous ressemble le plus…",
    options: [
      { text: "« Je ne sais pas si j'en suis capable, mais je vais essayer quand même. »", scores: { harry:3, ron:1, hermione:0, dumbledore:0, rogue:0, luna:0 } },
      { text: "« Je suis là si tu as besoin de moi. »", scores: { harry:0, ron:3, hermione:0, dumbledore:1, rogue:0, luna:1 } },
      { text: "« J'ai vérifié — et en fait, ce n'est pas tout à fait ça. »", scores: { harry:0, ron:0, hermione:3, dumbledore:1, rogue:1, luna:0 } },
      { text: "« Les choses sont rarement ce qu'elles semblent être. »", scores: { harry:0, ron:0, hermione:0, dumbledore:3, rogue:2, luna:3 } }
    ]
  }
];

const results = {
  harry: {
    name: "Harry Potter", emoji: "⚡",
    avatarBg: "#EEEDFE", color: "#7F77DD",
    traitBg: "#EEEDFE", traitText: "#3C3489",
    tagline: "Le héros malgré lui",
    traits: ["Courageux", "Loyal", "Impulsif", "Porteur de secrets"],
    desc: "Vous avancez même quand vous avez peur — et c'est précisément ça, le courage. Vous avez probablement intégré très tôt qu'il fallait vous débrouiller seul·e, et du coup vous portez beaucoup sans le montrer. Les gens vous font confiance instinctivement, parfois sans que vous compreniez pourquoi. La bonne nouvelle&nbsp;: vous n'avez pas à tout porter seul·e. La magie d'Harry, c'est aussi qu'il finit par accepter l'aide.",
    psy: "Profil de résilience construite — vous avez développé des ressources internes solides à partir d'une base fragile. Votre défi&nbsp;: apprendre à recevoir sans vous sentir redevable."
  },
  hermione: {
    name: "Hermione Granger", emoji: "📖",
    avatarBg: "#E1F5EE", color: "#1D9E75",
    traitBg: "#E1F5EE", traitText: "#085041",
    tagline: "L'intelligence comme armure",
    traits: ["Rigoureuse", "Fiable", "Perfectionniste", "Émotionnellement discrète"],
    desc: "Vous faites confiance aux faits, aux méthodes, aux plans. Quand quelque chose ne va pas, vous cherchez d'abord à comprendre avant de ressentir — ce qui vous rend très efficace, et parfois un peu épuisant·e à vivre de l'intérieur. Vous êtes le genre de personne sur qui on peut compter les yeux fermés. Ce que vous apprenez parfois avec du retard&nbsp;: l'efficacité ne remplace pas la vulnérabilité.",
    psy: "Style d'attachement sécure avec compensation intellectuelle. Votre intelligence émotionnelle est réelle — elle passe simplement en second, après la compréhension. Un travail sur l'expression directe des émotions peut vous libérer beaucoup d'énergie."
  },
  ron: {
    name: "Ron Weasley", emoji: "🧡",
    avatarBg: "#FAEEDA", color: "#BA7517",
    traitBg: "#FAEEDA", traitText: "#633806",
    tagline: "La loyauté comme super-pouvoir",
    traits: ["Chaleureux", "Loyal", "Parfois dans l'ombre", "Capable de revenir"],
    desc: "Vous n'avez peut-être pas toujours le rôle principal — et ça vous a pesé, à certains moments. Mais vous êtes celui·celle qui reste. Qui revient. Qui fait tenir les liens quand tout le monde est épuisé. C'est sous-estimé. Ron est celui qui ramène Harry à lui-même quand il se perd. Ce n'est pas rien&nbsp;: c'est peut-être le plus important.",
    psy: "Attachement sécure avec une dose d'anxiété de comparaison. Vous avez parfois du mal à croire que votre valeur propre est réelle, indépendamment de vos relations. Elle l'est."
  },
  dumbledore: {
    name: "Albus Dumbledore", emoji: "🌟",
    avatarBg: "#E6F1FB", color: "#378ADD",
    traitBg: "#E6F1FB", traitText: "#0C447C",
    tagline: "La sagesse et ses angles morts",
    traits: ["Visionnaire", "Patient", "Discret sur ses émotions", "Porteur de secrets lourds"],
    desc: "Vous voyez loin — parfois trop loin pour vous concentrer sur le présent. Vous avez une capacité à tenir des paradoxes, à ne pas paniquer quand les autres paniquent, à trouver un sens là où les autres voient du chaos. En contrepartie, vous pouvez être secret·e, stratégique parfois sans le vouloir, et vous oublier vous-même dans la gestion des autres. Dumbledore aussi avait ses regrets.",
    psy: "Profil de sur-fonctionnement affectif masqué par la sérénité apparente. Votre force est réelle — veillez à ne pas utiliser la sagesse comme une façon d'éviter de ressentir."
  },
  rogue: {
    name: "Severus Rogue", emoji: "🤍",
    avatarBg: "#F1EFE8", color: "#888780",
    traitBg: "#F1EFE8", traitText: "#444441",
    tagline: "La complexité comme identité",
    traits: ["Lucide", "Intense", "Fidèle à sa façon", "Difficile à lire"],
    desc: "Vous êtes difficile à cerner — et vous le faites en partie exprès. Vous observez beaucoup, dites peu, et jugez vite (même si vous le niez). Vous portez probablement quelque chose de douloureux depuis longtemps, et vous en avez fait une force, une carapace, une façon d'être. Les gens qui vous connaissent vraiment vous respectent profondément. Il y en a peu — et c'est votre choix autant que votre peur.",
    psy: "Deuil non résolu structurant l'identité. Le masque de dureté protège quelque chose de très précieux. La question n'est pas si vous pouvez vous permettre la vulnérabilité — c'est si vous pouvez vous permettre de ne pas l'avoir."
  },
  luna: {
    name: "Luna Lovegood", emoji: "🌿",
    avatarBg: "#EAF3DE", color: "#639922",
    traitBg: "#EAF3DE", traitText: "#27500A",
    tagline: "L'étrangeté comme liberté",
    traits: ["Authentique", "Sereine", "Décalée", "Profondément elle-même"],
    desc: "Vous n'avez jamais vraiment cherché à rentrer dans le moule — ou vous avez essayé et arrêté assez vite. Vous percevez les choses différemment, et cela peut vous isoler parfois, mais vous donne aussi une liberté que beaucoup vous envient sans l'admettre. Luna n'a pas de critique intérieure qui lui dit d'être autrement. C'est rare. C'est précieux. Protégez ça.",
    psy: "Haute tolérance à l'incertitude et à la différence. Très bonne régulation émotionnelle innée. Votre défi&nbsp;: ne pas laisser votre sérénité être prise pour de l'indifférence par ceux qui ont besoin d'être vus dans leur détresse."
  }
};

let current = 0;
let answers = Array(questions.length).fill(null);

function getScores() {
  const t = { harry:0, ron:0, hermione:0, dumbledore:0, rogue:0, luna:0 };
  answers.forEach((a, qi) => {
    if (a === null) return;
    const s = questions[qi].options[a].scores;
    Object.keys(s).forEach(k => { t[k] += s[k]; });
  });
  return t;
}

function getWinner(scores) {
  return Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
}

function render() {
  const root = document.getElementById('root');
  const total = questions.length;
  const done = answers.filter(a => a !== null).length;

  if (current >= total && done === total) {
    const scores = getScores();
    const winner = getWinner(scores);
    const r = results[winner];
    const maxScore = Math.max(...Object.values(scores));

    const barsHTML = Object.entries(scores)
      .sort((a, b) => b[1] - a[1])
      .map(([k, v]) => {
        const pct = maxScore > 0 ? Math.round((v / maxScore) * 100) : 0;
        return `<div class="score-row">
          <span class="score-name">${results[k].name.split(' ')[0]}</span>
          <div class="score-track"><div class="score-fill" style="width:${pct}%;background:${results[k].color}"></div></div>
          <span class="score-pct">${pct}&nbsp;%</span>
        </div>`;
      }).join('');

    root.innerHTML = `<div class="result">
      <div class="result-avatar" style="background:${r.avatarBg}">${r.emoji}</div>
      <div class="result-name">${r.name}</div>
      <div class="result-tagline">${r.tagline}</div>
      <div class="traits">${r.traits.map(t => `<span class="trait" style="background:${r.traitBg};color:${r.traitText}">${t}</span>`).join('')}</div>
      <div class="result-desc">${r.desc}</div>
      <div class="psy-block">
        <div class="psy-label">Lecture psy</div>
        <div class="psy-text">${r.psy}</div>
      </div>
      <div class="scores-title">Votre profil complet</div>
      ${barsHTML}
      <div class="restart-wrap">
        <button class="btn" onclick="resetTest()">↺ Recommencer le test</button>
      </div>
    </div>`;

    notifyResize();
    return;
  }

  const q = questions[current];
  const pct = Math.round((current / total) * 100);
  const sel = answers[current];

  root.innerHTML = `
    <div class="progress-wrap">
      <span class="progress-label">Question ${current + 1} sur ${total}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="question">${q.text}</div>
    <div class="options">
      ${q.options.map((o, i) => `
        <button class="option${sel === i ? ' selected' : ''}" onclick="select(${i})">${o.text}</button>
      `).join('')}
    </div>
    <div class="nav">
      <button class="btn" onclick="goBack()" ${current === 0 ? 'disabled' : ''}>← Retour</button>
      <button class="btn btn-primary" onclick="goNext()" ${sel === null ? 'disabled' : ''}>
        ${current === total - 1 ? 'Voir mon résultat →' : 'Suivant →'}
      </button>
    </div>`;

  notifyResize();
}

function notifyResize() {
  setTimeout(() => {
    const h = document.body.scrollHeight;
    window.parent.postMessage({ type: 'quiz-resize', height: h }, '*');
  }, 50);
}

function select(i) { answers[current] = i; render(); }
function goNext() { if (answers[current] === null) return; current++; render(); }
function goBack() { if (current > 0) { current--; render(); } }
function resetTest() { current = 0; answers = Array(questions.length).fill(null); render(); }

render();
</script>
</body>
</html>
