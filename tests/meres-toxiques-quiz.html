<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test : votre relation maternelle a-t-elle laissé des traces ?</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose-50:   #FFF1F3;
    --rose-100:  #FFE4E8;
    --rose-200:  #FECDD3;
    --rose-400:  #FB7185;
    --rose-600:  #E11D48;
    --rose-800:  #9F1239;
    --teal-50:   #F0FDFA;
    --teal-200:  #99F6E4;
    --teal-600:  #0D9488;
    --teal-800:  #115E59;
    --amber-50:  #FFFBEB;
    --amber-200: #FDE68A;
    --amber-600: #D97706;
    --amber-800: #92400E;
    --violet-50: #F5F3FF;
    --violet-200:#DDD6FE;
    --violet-600:#7C3AED;
    --violet-800:#4C1D95;
    --gray-50:   #F9FAFB;
    --gray-100:  #F3F4F6;
    --gray-200:  #E5E7EB;
    --gray-400:  #9CA3AF;
    --gray-600:  #4B5563;
    --gray-800:  #1F2937;
    --text:      #1a1a1a;
    --text-muted:#6b6b6b;
    --border:    rgba(0,0,0,0.10);
    --border-hover: rgba(0,0,0,0.22);
    --bg:        #ffffff;
    --bg-sec:    #f8f7f4;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    padding: 2rem 1.5rem 3rem;
    max-width: 640px;
    margin: 0 auto;
  }

  .header { text-align: center; margin-bottom: 2rem; }
  .header-badge {
    display: inline-block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--rose-600);
    background: var(--rose-50);
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 0.75rem;
  }
  .header h1 { font-size: 19px; font-weight: 500; color: var(--text); line-height: 1.45; }
  .header p  { font-size: 13px; color: var(--text-muted); margin-top: 0.5rem; }

  .progress-wrap { margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
  .progress-label { font-size: 12px; color: var(--text-muted); }
  .progress-bar   { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 1.75rem; overflow: hidden; }
  .progress-fill  { height: 100%; background: var(--rose-400); border-radius: 2px; transition: width 0.35s ease; }

  .question { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 1.25rem; line-height: 1.55; }

  .options { display: flex; flex-direction: column; gap: 9px; margin-bottom: 1.75rem; }
  .option {
    background: var(--bg);
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius-lg);
    padding: 12px 16px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
    font-family: inherit;
    line-height: 1.5;
  }
  .option:hover   { border-color: var(--rose-400); background: var(--rose-50); }
  .option.selected{ border: 2px solid var(--rose-600); background: var(--rose-50); color: var(--rose-800); font-weight: 500; }

  .nav { display: flex; justify-content: space-between; align-items: center; }
  .btn {
    background: transparent;
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius-md);
    padding: 9px 20px;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn:hover    { background: var(--bg-sec); }
  .btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
  .btn-primary  { background: var(--rose-600); color: #fff; border-color: var(--rose-600); }
  .btn-primary:hover { background: var(--rose-800); }

  /* Résultat */
  .result { animation: fadeUp 0.4s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-icon  { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 1rem; }
  .result-title { font-size: 21px; font-weight: 600; text-align: center; margin-bottom: 0.25rem; }
  .result-sub   { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 1.5rem; }

  .score-band { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
  .score-track { flex: 1; height: 8px; background: var(--gray-200); border-radius: 4px; overflow: hidden; }
  .score-fill  { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
  .score-label { font-size: 12px; color: var(--text-muted); min-width: 60px; text-align: right; }

  .result-desc { font-size: 14.5px; line-height: 1.75; margin-bottom: 1.25rem; color: var(--text); }

  .insight-block { background: var(--bg-sec); border-radius: var(--radius-md); padding: 14px 18px; margin-bottom: 1.25rem; }
  .insight-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 6px; }
  .insight-text  { font-size: 14px; line-height: 1.65; color: var(--text); }

  .disclaimer {
    background: var(--amber-50);
    border: 1px solid var(--amber-200);
    border-radius: var(--radius-md);
    padding: 12px 16px;
    font-size: 13px;
    color: var(--amber-800);
    line-height: 1.6;
    margin-bottom: 1.5rem;
  }

  .restart-wrap { text-align: center; margin-top: 1.5rem; }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">Auto-évaluation</div>
  <h1>Votre relation à votre mère a-t-elle laissé des traces&nbsp;?</h1>
  <p>10 questions · résultats immédiats · aucune donnée collectée</p>
</div>

<div id="root"></div>

<script>
const questions = [
  {
    text: "Quand vous faites une erreur, votre première réaction est…",
    options: [
      { text: "Me reprendre calmement et chercher comment faire mieux.", score: 0 },
      { text: "Me sentir déçu(e) de moi, mais passer à autre chose.", score: 1 },
      { text: "Entendre une voix intérieure très critique, difficile à faire taire.", score: 2 },
      { text: "Ressentir une honte profonde, comme si j'étais fondamentalement défaillant(e).", score: 3 }
    ]
  },
  {
    text: "Dans vos relations proches, vous avez tendance à…",
    options: [
      { text: "Faire confiance assez facilement et vous sentir en sécurité.", score: 0 },
      { text: "Prendre le temps d'observer avant de vous ouvrir.", score: 1 },
      { text: "Avoir peur d'être abandonné(e) ou de décevoir les autres.", score: 2 },
      { text: "Alterner entre trop vous donner et vous fermer brusquement.", score: 3 }
    ]
  },
  {
    text: "Lorsque vous exprimez un besoin ou une limite, vous ressentez…",
    options: [
      { text: "C'est normal — j'ai le droit d'avoir des besoins.", score: 0 },
      { text: "Un léger inconfort, mais je le fais quand même.", score: 1 },
      { text: "De la culpabilité, comme si je demandais trop.", score: 2 },
      { text: "Une vraie angoisse — je préfère souvent me taire.", score: 3 }
    ]
  },
  {
    text: "Face à une personne en colère contre vous, vous…",
    options: [
      { text: "Restez calme, vous expliquez, et laissez la tension retomber.", score: 0 },
      { text: "Vous sentez un peu sur la défensive, mais gérez.", score: 1 },
      { text: "Ressentez une anxiété forte et cherchez à apaiser à tout prix.", score: 2 },
      { text: "Vous figez ou partez — la confrontation est insupportable.", score: 3 }
    ]
  },
  {
    text: "Sur la question de mériter l'amour et l'attention des autres, vous pensez…",
    options: [
      { text: "Oui, comme tout le monde, sans conditions.", score: 0 },
      { text: "En général oui, mais j'ai parfois des doutes.", score: 1 },
      { text: "Il faut que je mérite — si je fais un faux pas, ça peut partir.", score: 2 },
      { text: "Au fond, je ne suis pas sûr(e) de le mériter vraiment.", score: 3 }
    ]
  },
  {
    text: "Quand vous pensez à votre mère, quelle émotion arrive en premier ?",
    options: [
      { text: "De la chaleur, ou une sérénité paisible.", score: 0 },
      { text: "De l'affection mêlée d'ambivalence — c'était compliqué mais bien global.", score: 1 },
      { text: "Une fatigue émotionnelle, ou une tristesse diffuse.", score: 2 },
      { text: "De la colère, une douleur vive, ou un vide.", score: 3 }
    ]
  },
  {
    text: "Face au succès ou à un compliment, vous…",
    options: [
      { text: "L'accueillez avec plaisir — vous savez que c'est mérité.", score: 0 },
      { text: "Êtes content(e), mais un peu gêné(e) aussi.", score: 1 },
      { text: "Avez du mal à y croire ou attendez que ça se retourne.", score: 2 },
      { text: "Ressentez souvent que vous êtes un(e) imposteur(e).", score: 3 }
    ]
  },
  {
    text: "Votre rapport à vos propres émotions est…",
    options: [
      { text: "Plutôt fluide — je les reconnais et les exprime sans trop de difficulté.", score: 0 },
      { text: "Variable — certaines sont plus faciles que d'autres.", score: 1 },
      { text: "Compliqué — j'ai du mal à nommer ou montrer ce que je ressens.", score: 2 },
      { text: "Coupé — parfois je ne ressens presque rien, ou ça déborde sans prévenir.", score: 3 }
    ]
  },
  {
    text: "Quand vous devez prendre soin de vous (repos, plaisir, santé), vous…",
    options: [
      { text: "Le faites naturellement — c'est une priorité.", score: 0 },
      { text: "Y pensez mais le remettez souvent à plus tard.", score: 1 },
      { text: "Ressentez que vous ne le méritez pas vraiment.", score: 2 },
      { text: "Avez du mal à vous y autoriser — ça déclenche de la culpabilité.", score: 3 }
    ]
  },
  {
    text: "Dans l'ensemble, votre relation à vous-même est…",
    options: [
      { text: "Bienveillante — je suis globalement en paix avec qui je suis.", score: 0 },
      { text: "En chantier — j'avance, avec des hauts et des bas.", score: 1 },
      { text: "Difficile — je me juge souvent très sévèrement.", score: 2 },
      { text: "Douloureuse — il m'arrive de ne pas m'aimer du tout.", score: 3 }
    ]
  }
];

const profiles = [
  {
    min: 0, max: 7,
    icon: '🌿', iconBg: 'var(--teal-50)', iconColor: 'var(--teal-600)',
    scoreColor: 'var(--teal-600)',
    title: 'Peu de traces visibles',
    sub: 'Relation maternelle globalement sécurisante',
    desc: 'Vos réponses indiquent que votre relation à votre mère vous a offert une base plutôt stable. Vous semblez avoir internalisé une image de vous-même positive, et vos relations actuelles reflètent cet ancrage. Cela ne veut pas dire que tout était parfait — mais les inévitables imperfections n'ont pas laissé d'empreintes structurantes difficiles.',
    insight: 'Votre capacité à vous faire confiance et à accueillir l'affection des autres est précieuse. Elle s'est probablement construite dans une relation maternelle où vous étiez vu(e), entendu(e) et répondu(e) de façon suffisamment cohérente.',
    action: 'Continuer à cultiver cette bienveillance envers vous-même est la meilleure façon d'en bénéficier et de la transmettre.'
  },
  {
    min: 8, max: 15,
    icon: '🌤', iconBg: 'var(--amber-50)', iconColor: 'var(--amber-600)',
    scoreColor: 'var(--amber-600)',
    title: 'Quelques schémas persistants',
    sub: 'Ambivalence et doutes hérités',
    desc: 'Vos réponses suggèrent une relation maternelle complexe — probablement faite de moments nourrissants et d'autres plus difficiles. Il en reste quelques empreintes : une tendance à douter de vous, à vous montrer plus exigeant(e) envers vous qu'envers les autres, ou à vous sentir moins légitime que vous ne l'êtes.',
    insight: 'Ces schémas sont fréquents et n'ont rien d'immuable. Ils se sont construits comme des adaptations intelligentes à une relation pas toujours sécurisante — et ils peuvent évoluer.',
    action: 'Repérer ces schémas quand ils se réactivent (dans les conflits, face aux compliments, dans l'intimité) est déjà une étape importante. Un travail réflexif — seul ou accompagné — peut faire beaucoup.'
  },
  {
    min: 16, max: 23,
    icon: '🌧', iconBg: 'var(--violet-50)', iconColor: 'var(--violet-600)',
    scoreColor: 'var(--violet-600)',
    title: 'Schémas significatifs présents',
    sub: 'Traces durables sur l'estime de soi et les liens',
    desc: 'Vos réponses indiquent des schémas profonds issus de la relation maternelle : une autocritique importante, des difficultés dans l'intimité ou à recevoir de l'amour, et peut-être une voix intérieure qui ne vous ménage pas. Ces traces sont réelles — elles ne sont pas "dans la tête" et ne disparaissent pas seules.',
    insight: 'Ce que vous portez reflète probablement une relation maternelle qui ne vous a pas donné suffisamment de sécurité émotionnelle. Ce n'est pas un verdict sur vous, c'est un héritage relationnel — et les héritages peuvent se travailler.',
    action: 'Un accompagnement thérapeutique (TCC, thérapie d'attachement, EMDR, psychanalyse) peut vous aider à défaire ces nœuds progressivement. Vous méritez ce soutien.'
  },
  {
    min: 24, max: 30,
    icon: '🌊', iconBg: 'var(--rose-50)', iconColor: 'var(--rose-600)',
    scoreColor: 'var(--rose-600)',
    title: 'Impact important à explorer',
    sub: 'Blessures d'attachement significatives',
    desc: 'Vos réponses suggèrent que la relation à votre mère a laissé des traces profondes — dans votre rapport à vous-même, à vos émotions, et à vos relations. Une honte internalisée, des difficultés à vous faire confiance ou à vous sentir aimable, une vie émotionnelle compliquée : tout cela parle d'une souffrance réelle qui mérite d'être entendue.',
    insight: 'Ce que vous portez n'est pas une faiblesse : c'est la conséquence d'une relation qui ne vous a pas donné ce dont vous aviez besoin. Vous avez survécu avec ce que vous aviez. Maintenant, avec du soutien, vous pouvez avancer autrement.',
    action: 'Parler à un professionnel de santé mentale n'est pas un luxe — c'est exactement ce pour quoi ils existent. Vous n'êtes pas obligé(e) de porter ça seul(e).'
  }
];

let current = 0;
let answers  = Array(questions.length).fill(null);

function getProfile(total) {
  return profiles.find(p => total >= p.min && total <= p.max) || profiles[profiles.length - 1];
}

function render() {
  const root = document.getElementById('root');

  if (current < questions.length) {
    const q   = questions[current];
    const pct = Math.round((current / questions.length) * 100);
    root.innerHTML = `
      <div class="progress-wrap">
        <span class="progress-label">Question ${current + 1} / ${questions.length}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="question">${q.text}</div>
      <div class="options">
        ${q.options.map((o, i) => `
          <button class="option${answers[current] === i ? ' selected' : ''}" onclick="select(${i})">${o.text}</button>
        `).join('')}
      </div>
      <div class="nav">
        <button class="btn" onclick="goBack()" ${current === 0 ? 'disabled' : ''}>← Précédent</button>
        <button class="btn btn-primary" onclick="goNext()" ${answers[current] === null ? 'disabled' : ''}>
          ${current === questions.length - 1 ? 'Voir mon résultat' : 'Suivant →'}
        </button>
      </div>`;
  } else {
    const total   = answers.reduce((s, i, qi) => s + (i !== null ? questions[qi].options[i].score : 0), 0);
    const maxScore = questions.length * 3;
    const p       = getProfile(total);
    const pct     = Math.round((total / maxScore) * 100);

    root.innerHTML = `
      <div class="result">
        <div class="result-icon" style="background:${p.iconBg};color:${p.iconColor}">${p.icon}</div>
        <div class="result-title">${p.title}</div>
        <div class="result-sub">${p.sub}</div>

        <div class="score-band">
          <div class="score-track"><div class="score-fill" style="width:${pct}%;background:${p.scoreColor}"></div></div>
          <div class="score-label">${total} / ${maxScore}</div>
        </div>

        <div class="result-desc">${p.desc}</div>

        <div class="insight-block">
          <div class="insight-label">🔍 Ce que ça dit</div>
          <div class="insight-text">${p.insight}</div>
        </div>

        <div class="insight-block">
          <div class="insight-label">🌱 Ce que vous pouvez faire</div>
          <div class="insight-text">${p.action}</div>
        </div>

        <div class="disclaimer">
          ⚕️ <strong>Rappel important :</strong> Ce questionnaire est un outil de réflexion, pas un diagnostic. Seul un professionnel de santé mentale peut évaluer votre situation. En cas de détresse, appelez le <strong>3114</strong> (gratuit, 24h/24).
        </div>

        <div class="restart-wrap">
          <button class="btn" onclick="restart()">↺ Recommencer</button>
        </div>
      </div>`;
  }

  notifyResize();
}

function select(i)  { answers[current] = i; render(); }
function goNext()   { if (answers[current] === null) return; current++; render(); }
function goBack()   { if (current > 0) { current--; render(); } }
function restart()  { current = 0; answers = Array(questions.length).fill(null); render(); }

function notifyResize() {
  setTimeout(function() {
    window.parent.postMessage({ type: 'quiz-resize', height: document.body.scrollHeight }, '*');
  }, 50);
}

render();
</script>
</body>
</html>
