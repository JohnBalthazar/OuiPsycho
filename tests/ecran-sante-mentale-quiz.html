<html lang="fr">
<head>

<title>Test : où en êtes-vous avec les écrans ?</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal-50:   #F0FDFA;
    --teal-200:  #99F6E4;
    --teal-400:  #2DD4BF;
    --teal-600:  #0D9488;
    --teal-800:  #115E59;
    --amber-50:  #FFFBEB;
    --amber-200: #FDE68A;
    --amber-600: #D97706;
    --amber-800: #92400E;
    --orange-50: #FFF7ED;
    --orange-200:#FED7AA;
    --orange-600:#EA580C;
    --orange-800:#9A3412;
    --red-50:    #FEF2F2;
    --red-200:   #FECACA;
    --red-600:   #DC2626;
    --red-800:   #991B1B;
    --gray-50:   #F9FAFB;
    --gray-100:  #F3F4F6;
    --gray-200:  #E5E7EB;
    --gray-400:  #9CA3AF;
    --gray-600:  #4B5563;
    --gray-800:  #1F2937;
    --text:      #1a1a1a;
    --text-muted:#6b6b6b;
    --border:    rgba(0,0,0,0.10);
    --border-hover: rgba(0,0,0,0.22);
    --bg:        #ffffff;
    --bg-sec:    #f8f7f4;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    padding: 2rem 1.5rem 3rem;
    max-width: 640px;
    margin: 0 auto;
  }

  .header { text-align: center; margin-bottom: 2rem; }
  .header-badge {
    display: inline-block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--teal-600);
    background: var(--teal-50);
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 0.75rem;
  }
  .header h1 { font-size: 19px; font-weight: 500; color: var(--text); line-height: 1.45; }
  .header p  { font-size: 13px; color: var(--text-muted); margin-top: 0.5rem; }

  .progress-wrap { margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
  .progress-label { font-size: 12px; color: var(--text-muted); }
  .progress-bar   { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 1.75rem; overflow: hidden; }
  .progress-fill  { height: 100%; background: var(--teal-400); border-radius: 2px; transition: width 0.35s ease; }

  .question { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 1.25rem; line-height: 1.55; }

  .options { display: flex; flex-direction: column; gap: 9px; margin-bottom: 1.75rem; }
  .option {
    background: var(--bg);
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius-lg);
    padding: 12px 16px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
    font-family: inherit;
    line-height: 1.5;
  }
  .option:hover   { border-color: var(--teal-400); background: var(--teal-50); }
  .option.selected{ border: 2px solid var(--teal-600); background: var(--teal-50); color: var(--teal-800); font-weight: 500; }

  .nav { display: flex; justify-content: space-between; align-items: center; }
  .btn {
    background: transparent;
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius-md);
    padding: 9px 20px;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn:hover    { background: var(--bg-sec); }
  .btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
  .btn-primary  { background: var(--teal-600); color: #fff; border-color: var(--teal-600); }
  .btn-primary:hover { background: var(--teal-800); }

  .result { animation: fadeUp 0.4s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-icon  { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 1rem; }
  .result-title { font-size: 21px; font-weight: 600; text-align: center; margin-bottom: 0.25rem; }
  .result-sub   { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 1.5rem; }

  .score-band { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
  .score-track { flex: 1; height: 8px; background: var(--gray-200); border-radius: 4px; overflow: hidden; }
  .score-fill  { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
  .score-label { font-size: 12px; color: var(--text-muted); min-width: 60px; text-align: right; }

  .result-desc { font-size: 14.5px; line-height: 1.75; margin-bottom: 1.25rem; color: var(--text); }

  .insight-block { background: var(--bg-sec); border-radius: var(--radius-md); padding: 14px 18px; margin-bottom: 1.25rem; }
  .insight-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 6px; }
  .insight-text  { font-size: 14px; line-height: 1.65; color: var(--text); }

  .disclaimer {
    background: var(--amber-50);
    border: 1px solid var(--amber-200);
    border-radius: var(--radius-md);
    padding: 12px 16px;
    font-size: 13px;
    color: var(--amber-800);
    line-height: 1.6;
    margin-bottom: 1.5rem;
  }

  .restart-wrap { text-align: center; margin-top: 1.5rem; }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">Auto-évaluation</div>
  <h1>Où en êtes-vous avec les écrans&nbsp;?</h1>
  <p>7 questions · résultats immédiats · aucune donnée collectée</p>
</div>

<div id="root"></div>

<script>
const questions = [
  {
    text: "Le soir, vous posez votre téléphone avant de dormir…",
    options: [
      { text: "Facilement — j'ai des limites claires et je les respecte.", score: 0 },
      { text: "En général oui, mais il m'arrive de scroller plus tard que prévu.", score: 1 },
      { text: "Difficilement — je repousse le moment d'arrêter sans vraiment le décider.", score: 2 },
      { text: "Souvent au dernier moment, parfois il s'endort dans ma main.", score: 3 }
    ]
  },
  {
    text: "Quand vous n'avez pas votre téléphone à portée de main, vous ressentez…",
    options: [
      { text: "Rien de particulier — je m'en passe facilement.", score: 0 },
      { text: "Un léger manque, vite oublié si je suis occupé(e).", score: 1 },
      { text: "Une certaine anxiété — et vérifier les notifications me soulage.", score: 2 },
      { text: "Une agitation difficile à ignorer.", score: 3 }
    ]
  },
  {
    text: "Pendant un repas avec des proches, vous regardez votre téléphone…",
    options: [
      { text: "Presque jamais — je suis vraiment présent(e).", score: 0 },
      { text: "Rarement, si quelque chose d'important attend.", score: 1 },
      { text: "Régulièrement, presque par automatisme.", score: 2 },
      { text: "Très souvent — j'ai du mal à m'en empêcher.", score: 3 }
    ]
  },
  {
    text: "Avez-vous déjà ouvert une appli, puis réalisé que vous ne saviez plus pourquoi ?",
    options: [
      { text: "Non, c'est rarissime.", score: 0 },
      { text: "Oui, parfois — mais je refermais vite.", score: 1 },
      { text: "Oui, régulièrement — et je finissais par scroller quand même.", score: 2 },
      { text: "Oui, souvent — c'est devenu un réflexe inconscient.", score: 3 }
    ]
  },
  {
    text: "Le contenu que vous consommez sur les réseaux vous laisse généralement…",
    options: [
      { text: "Informé(e) ou diverti(e) — je l'utilise avec intention.", score: 0 },
      { text: "Neutre — ni vraiment rechargé(e) ni vraiment vidé(e).", score: 1 },
      { text: "Parfois épuisé(e) ou légèrement anxieux(se) après coup.", score: 2 },
      { text: "Souvent irritable, insatisfait(e) ou comparé(e) aux autres.", score: 3 }
    ]
  },
  {
    text: "Avez-vous déjà essayé de réduire votre temps d'écran ?",
    options: [
      { text: "Je n'en ai pas besoin — mon usage me convient.", score: 0 },
      { text: "J'ai ajusté certaines choses, ça marche bien.", score: 1 },
      { text: "Oui, avec des succès limités — je reprends vite mes habitudes.", score: 2 },
      { text: "Oui, plusieurs fois — sans y arriver durablement.", score: 3 }
    ]
  },
  {
    text: "Quand vous dormez, êtes-vous vraiment déconnecté(e) ?",
    options: [
      { text: "Oui — le téléphone est hors de la chambre ou en mode avion.", score: 0 },
      { text: "À peu près — il est en silencieux, mais à portée.", score: 1 },
      { text: "Non vraiment — je le consulte si je me réveille.", score: 2 },
      { text: "Je l'ai souvent en main jusqu'au moment de fermer les yeux.", score: 3 }
    ]
  }
];

const profiles = [
  {
    min: 0, max: 5,
    icon: "🌿", iconBg: "var(--teal-50)", iconColor: "var(--teal-600)",
    scoreColor: "var(--teal-600)",
    title: "Relation apaisée",
    sub: "Vous utilisez les écrans, ils ne vous utilisent pas",
    desc: "Vos réponses indiquent un rapport aux écrans intentionnel et maîtrisé. Vous avez des limites que vous respectez, et votre usage reflète vos choix plutôt qu'une habitude automatique. Dans un monde conçu pour capter l'attention, c'est une posture rare et précieuse.",
    insight: "Ce profil ne signifie pas zéro écran — il signifie des écrans choisis. La différence entre consommation active et consommation passive est au cœur de ce résultat.",
    action: "Continuez à questionner régulièrement votre usage : les habitudes numériques peuvent dériver sans qu'on s'en aperçoive. Un bilan annuel vaut mieux qu'une prise de conscience tardive."
  },
  {
    min: 6, max: 11,
    icon: "🌤", iconBg: "var(--amber-50)", iconColor: "var(--amber-600)",
    scoreColor: "var(--amber-600)",
    title: "Usage modéré, vigilance salutaire",
    sub: "Quelques automatismes à surveiller",
    desc: "Votre rapport aux écrans est globalement raisonnable, mais quelques automatismes se sont installés — le réflexe de vérifier, la difficulté à poser le téléphone, la légère anxiété sans lui. Ce n'est pas alarmant, mais c'est le bon moment pour remettre un peu d'intention dans votre usage.",
    insight: "Le passage de l'usage intentionnel à l'usage automatique se fait progressivement, sans qu'on s'en rende compte. Ce que vous identifiez maintenant peut se régler facilement — avant que les habitudes ne se solidifient.",
    action: "Essayez une semaine de retirer les notifications non essentielles et d'observer l'effet sur votre état mental. Souvent, c'est plus révélateur qu'un bilan de temps d'écran."
  },
  {
    min: 12, max: 17,
    icon: "🌧", iconBg: "var(--orange-50)", iconColor: "var(--orange-600)",
    scoreColor: "var(--orange-600)",
    title: "Usage préoccupant",
    sub: "Le pilote automatique a pris la main",
    desc: "Vos réponses indiquent un usage des écrans qui échappe souvent à votre contrôle conscient. Vous n'êtes pas en train de choisir de scroller — c'est l'habitude qui choisit pour vous. Et vous en ressentez probablement les effets : sommeil perturbé, difficulté à vous concentrer, sentiment diffus de temps gaspillé.",
    insight: "Ce n'est pas une question de volonté : les applications sont conçues pour exploiter vos circuits dopaminergiques. Le problème n'est pas vous — mais la solution l'est.",
    action: "Commencez par une mesure concrète : téléphone hors de la chambre à coucher. Cela seul peut changer significativement votre sommeil et votre humeur matinale. Ajoutez ensuite une contrainte à la fois, sans vous juger."
  },
  {
    min: 18, max: 21,
    icon: "🌊", iconBg: "var(--red-50)", iconColor: "var(--red-600)",
    scoreColor: "var(--red-600)",
    title: "Pilotage automatique avancé",
    sub: "L'écran est devenu un réflexe de fond",
    desc: "Vos réponses suggèrent un usage des écrans très automatisé, qui interfère avec votre sommeil, vos relations et probablement votre capacité à vous concentrer. Ce n'est pas une faiblesse de caractère — c'est le résultat d'une exposition prolongée à des systèmes conçus pour maximiser l'engagement.",
    insight: "La dépendance comportementale aux écrans partage des mécanismes avec d'autres formes de comportements compulsifs : l'usage soulage à court terme une anxiété qu'il aggrave à moyen terme. Reconnaître ce cycle est la première étape.",
    action: "Un accompagnement peut être utile pour recréer de l'espace entre l'impulsion et le geste. Des applications de contrôle comme Forest ou des réglages de temps d'écran natifs aident — mais le travail de fond est souvent plus profond. En cas de souffrance réelle, n'hésitez pas à consulter."
  }
];

let current = 0;
let answers  = Array(questions.length).fill(null);

function getProfile(total) {
  return profiles.find(p => total >= p.min && total <= p.max) || profiles[profiles.length - 1];
}

function render() {
  const root = document.getElementById('root');

  if (current < questions.length) {
    const q   = questions[current];
    const pct = Math.round((current / questions.length) * 100);
    root.innerHTML = `
      <div class="progress-wrap">
        <span class="progress-label">Question ${current + 1} / ${questions.length}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="question">${q.text}</div>
      <div class="options">
        ${q.options.map((o, i) => `
          <button class="option${answers[current] === i ? ' selected' : ''}" onclick="select(${i})">${o.text}</button>
        `).join('')}
      </div>
      <div class="nav">
        <button class="btn" onclick="goBack()" ${current === 0 ? 'disabled' : ''}>← Précédent</button>
        <button class="btn btn-primary" onclick="goNext()" ${answers[current] === null ? 'disabled' : ''}>
          ${current === questions.length - 1 ? 'Voir mon résultat' : 'Suivant →'}
        </button>
      </div>`;
  } else {
    const total   = answers.reduce((s, i, qi) => s + (i !== null ? questions[qi].options[i].score : 0), 0);
    const maxScore = questions.length * 3;
    const p       = getProfile(total);
    const pct     = Math.round((total / maxScore) * 100);

    root.innerHTML = `
      <div class="result">
        <div class="result-icon" style="background:${p.iconBg};color:${p.iconColor}">${p.icon}</div>
        <div class="result-title">${p.title}</div>
        <div class="result-sub">${p.sub}</div>

        <div class="score-band">
          <div class="score-track"><div class="score-fill" style="width:${pct}%;background:${p.scoreColor}"></div></div>
          <div class="score-label">${total} / ${maxScore}</div>
        </div>

        <div class="result-desc">${p.desc}</div>

        <div class="insight-block">
          <div class="insight-label">🔍 Ce que ça dit</div>
          <div class="insight-text">${p.insight}</div>
        </div>

        <div class="insight-block">
          <div class="insight-label">🛠️ Ce que vous pouvez faire</div>
          <div class="insight-text">${p.action}</div>
        </div>

        <div class="disclaimer">
          ⚕️ <strong>Rappel :</strong> Ce questionnaire est un outil de réflexion, pas un diagnostic. Pour toute souffrance liée à votre usage des écrans, consultez un professionnel de santé mentale. En cas de détresse, appelez le <strong>3114</strong> (gratuit, 24h/24).
        </div>

        <div class="restart-wrap">
          <button class="btn" onclick="restart()">↺ Recommencer</button>
        </div>
      </div>`;
  }

  notifyResize();
}

function select(i)  { answers[current] = i; render(); }
function goNext()   { if (answers[current] === null) return; current++; render(); }
function goBack()   { if (current > 0) { current--; render(); } }
function restart()  { current = 0; answers = Array(questions.length).fill(null); render(); }

function notifyResize() {
  setTimeout(function() {
    window.parent.postMessage({ type: 'quiz-resize', height: document.body.scrollHeight }, '*');
  }, 50);
}

render();
</script>
</body>
</html>
