<title>Quel sex-symbol êtes-vous ?</title>
<style>
  :root{
    --bg:#fffaf5; --card:#ffffff; --ink:#3a3340; --muted:#8a8190;
    --coral:#e8927c; --coral-d:#d97a62; --lav:#b8a8d9; --peach:#fbe3d6;
    --gold:#e9b872; --green:#9bc4a6; --line:#f0e6dd;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
       color:var(--ink);background:transparent;line-height:1.55;}
  .wrap{max-width:560px;margin:0 auto;padding:4px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;
        padding:24px 22px;box-shadow:0 8px 30px rgba(180,140,120,.10);}
  .progress{height:6px;background:var(--peach);border-radius:99px;overflow:hidden;margin-bottom:18px;}
  .bar{height:100%;width:0;background:linear-gradient(90deg,var(--coral),var(--lav));
       border-radius:99px;transition:width .35s ease;}
  .step{font-size:.78rem;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  h1{font-size:1.18rem;margin:0 0 18px;line-height:1.35;}
  .opt{display:block;width:100%;text-align:left;border:1.5px solid var(--line);
       background:#fff;color:var(--ink);padding:13px 15px;border-radius:12px;margin:9px 0;
       font-size:.97rem;cursor:pointer;transition:all .15s ease;}
  .opt:hover{border-color:var(--coral);background:#fff7f3;transform:translateY(-1px);}
  .res-emoji{font-size:2.6rem;line-height:1;margin-bottom:6px;}
  .res-title{font-size:1.35rem;font-weight:700;margin:2px 0 4px;color:var(--coral-d);}
  .res-tag{display:inline-block;font-size:.78rem;color:var(--muted);
           background:var(--peach);padding:4px 10px;border-radius:99px;margin-bottom:14px;}
  .res-text{font-size:.97rem;color:var(--ink);}
  .res-text strong{color:var(--coral-d);}
  .again{margin-top:20px;display:inline-flex;align-items:center;gap:8px;border:none;
         background:linear-gradient(90deg,var(--coral),var(--coral-d));color:#fff;
         padding:11px 20px;border-radius:99px;font-size:.92rem;font-weight:600;cursor:pointer;}
  .again:hover{filter:brightness(1.05);}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="progress"><div class="bar" id="bar"></div></div>
    <div id="quiz"></div>
  </div>
</div>
<script>
var QUESTIONS=[
 {q:"En soirée, on vous repère plutôt...",a:[
   ["au centre, à faire rire toute la tablée","solaire"],
   ["en retrait, le regard insondable","magnetique"],
   ["à refaire le monde dans un coin","esprit"],
   ["à transgresser gentiment le règlement","rebelle"]]},
 {q:"Votre arme de séduction secrète ?",a:[
   ["votre sourire qui désarme","solaire"],
   ["votre silence qui intrigue","magnetique"],
   ["votre conversation qui captive","esprit"],
   ["votre audace qui électrise","rebelle"]]},
 {q:"On vous compare souvent à...",a:[
   ["un rayon de soleil","solaire"],
   ["une énigme bien gardée","magnetique"],
   ["un livre dont on ne décroche pas","esprit"],
   ["une étincelle imprévisible","rebelle"]]},
 {q:"Le compliment qui vous touche le plus ?",a:[
   ["\"tu illumines une pièce\"","solaire"],
   ["\"on ne sait jamais à quoi tu penses\"","magnetique"],
   ["\"tu es fascinant à écouter\"","esprit"],
   ["\"tu n'as peur de rien\"","rebelle"]]},
 {q:"Votre idée du moment parfait ?",a:[
   ["une plage, des amis, des éclats de rire","solaire"],
   ["un bar feutré, une conversation à deux","magnetique"],
   ["une expo puis un débat jusqu'à l'aube","esprit"],
   ["un road trip décidé à la dernière minute","rebelle"]]},
 {q:"Au cinéma, vous seriez plutôt...",a:[
   ["la star solaire que tout le monde adore","solaire"],
   ["la figure fatale et insaisissable","magnetique"],
   ["l'esprit brillant qui fait chavirer par les mots","esprit"],
   ["l'antihéro charismatique et frondeur","rebelle"]]}
];
var RESULTS={
 solaire:{emoji:"☀️",title:"L'icône solaire",tag:"chaleur & lumière",
   text:"Vous séduisez comme on réchauffe : sans effort apparent. <strong>Généreux·se, accessible, rayonnant·e</strong>, vous mettez les gens à l'aise et c'est précisément là votre magnétisme. Pensez Marilyn côté lumineux, ou l'énergie d'une Beyoncé. Votre seul piège : croire que vous devez briller en permanence. Vous avez aussi le droit d'éteindre la lumière."},
 magnetique:{emoji:"🌑",title:"Le charme magnétique",tag:"mystère & retenue",
   text:"Vous ne dites pas tout, et c'est exactement ce qui fait tourner les têtes. <strong>Réservé·e, élégant·e, un brin énigmatique</strong>, vous laissez l'autre compléter le tableau, ce fameux effet de halo qui transforme le silence en profondeur. Côté Garbo ou Bardot. Attention quand même : derrière le mystère, n'oubliez pas de vous laisser vraiment connaître."},
 esprit:{emoji:"💬",title:"L'esprit séduisant",tag:"verbe & intelligence",
   text:"Votre arme fatale, c'est la matière grise. <strong>Vif·ve, curieux·se, drôle</strong>, vous séduisez par une phrase bien placée plus sûrement que par un selfie. Le charme intellectuel a ceci de magique qu'il ne se périme pas. Votre défi : accepter qu'on puisse aussi vous trouver craquant·e quand vous ne dites rien d'intelligent."},
 rebelle:{emoji:"⚡",title:"Le rebelle iconique",tag:"audace & liberté",
   text:"Vous ne suivez pas la règle, vous l'inventez, et ça, c'est terriblement attirant. <strong>Libre, intense, imprévisible</strong>, vous incarnez le frisson façon James Dean. Le danger maîtrisé fait fondre, c'est connu. Le revers : tout le monde n'a pas envie d'un grand huit permanent. Choisissez vos batailles."}
};
var idx=0, scores={solaire:0,magnetique:0,esprit:0,rebelle:0};

function notifyResize(){setTimeout(function(){
  window.parent.postMessage({type:'quiz-resize',height:document.body.scrollHeight},'*');
},50);}

function render(){
  var bar=document.getElementById('bar');
  bar.style.width=((idx)/QUESTIONS.length*100)+'%';
  var q=QUESTIONS[idx], html='';
  html+='<div class="step">Question '+(idx+1)+' / '+QUESTIONS.length+'</div>';
  html+='<h1>'+q.q+'</h1>';
  for(var i=0;i<q.a.length;i++){
    html+='<button class="opt" onclick="answer(\''+q.a[i][1]+'\')">'+q.a[i][0]+'</button>';
  }
  document.getElementById('quiz').innerHTML=html;
  notifyResize();
}
function answer(type){
  scores[type]++;
  idx++;
  if(idx<QUESTIONS.length){render();}else{showResult();}
}
function showResult(){
  document.getElementById('bar').style.width='100%';
  var best='solaire',max=-1;
  ['solaire','magnetique','esprit','rebelle'].forEach(function(k){
    if(scores[k]>max){max=scores[k];best=k;}
  });
  var r=RESULTS[best];
  var html='<div style="text-align:center">';
  html+='<div class="res-emoji">'+r.emoji+'</div>';
  html+='<div class="res-title">'+r.title+'</div>';
  html+='<span class="res-tag">'+r.tag+'</span></div>';
  html+='<p class="res-text">'+r.text+'</p>';
  html+='<div style="text-align:center"><button class="again" onclick="restart()">↺ Refaire le test</button></div>';
  document.getElementById('quiz').innerHTML=html;
  notifyResize();
}
function restart(){
  idx=0;scores={solaire:0,magnetique:0,esprit:0,rebelle:0};render();
}
render();
window.addEventListener('load',notifyResize);
</script>
</body>
</html>
