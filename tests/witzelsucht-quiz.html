<title>Test : êtes-vous (ou quelqu'un que vous connaissez) atteint du syndrome de Witzelsucht ?</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --amber-50:  #FFFBEB;
    --amber-100: #FEF3C7;
    --amber-200: #FDE68A;
    --amber-400: #FBBF24;
    --amber-600: #D97706;
    --amber-800: #92400E;
    --orange-50: #FFF7ED;
    --orange-400:#FB923C;
    --orange-600:#EA580C;
    --green-50:  #F0FDF4;
    --green-200: #BBF7D0;
    --green-600: #16A34A;
    --green-800: #14532D;
    --red-50:    #FEF2F2;
    --red-200:   #FECACA;
    --red-600:   #DC2626;
    --red-800:   #991B1B;
    --gray-50:   #F9FAFB;
    --gray-200:  #E5E7EB;
    --gray-400:  #9CA3AF;
    --text:      #1a1a1a;
    --text-muted:#6b6b6b;
    --border:    rgba(0,0,0,0.10);
    --border-h:  rgba(0,0,0,0.22);
    --bg:        #ffffff;
    --bg-sec:    #faf9f6;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    padding: 2rem 1.5rem 3rem;
    max-width: 640px;
    margin: 0 auto;
  }

  .header { text-align: center; margin-bottom: 2rem; }
  .header-badge {
    display: inline-block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--amber-600);
    background: var(--amber-50);
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 0.75rem;
  }
  .header h1 { font-size: 19px; font-weight: 500; line-height: 1.45; }
  .header p  { font-size: 13px; color: var(--text-muted); margin-top: 0.5rem; }

  .progress-wrap { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
  .progress-label { font-size: 12px; color: var(--text-muted); }
  .progress-bar   { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 1.75rem; overflow: hidden; }
  .progress-fill  { height: 100%; background: var(--amber-400); border-radius: 2px; transition: width 0.35s ease; }

  .question { font-size: 16px; font-weight: 500; margin-bottom: 1.25rem; line-height: 1.55; }
  .question-note { font-size: 13px; color: var(--text-muted); font-weight: 400; }

  .options { display: flex; flex-direction: column; gap: 9px; margin-bottom: 1.75rem; }
  .option {
    background: var(--bg);
    border: 0.5px solid var(--border-h);
    border-radius: var(--radius-lg);
    padding: 12px 16px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
    font-family: inherit;
    line-height: 1.5;
  }
  .option:hover    { border-color: var(--amber-400); background: var(--amber-50); }
  .option.selected { border: 2px solid var(--amber-600); background: var(--amber-50); color: var(--amber-800); font-weight: 500; }

  .nav { display: flex; justify-content: space-between; }
  .btn {
    background: transparent;
    border: 0.5px solid var(--border-h);
    border-radius: var(--radius-md);
    padding: 9px 20px;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn:hover    { background: var(--bg-sec); }
  .btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
  .btn-primary  { background: var(--amber-600); color: #fff; border-color: var(--amber-600); }
  .btn-primary:hover { background: var(--amber-800); }

  .result { animation: fadeUp 0.4s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .result-icon  { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 1rem; }
  .result-title { font-size: 22px; font-weight: 600; text-align: center; margin-bottom: 0.25rem; }
  .result-sub   { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 1.5rem; }
  .result-desc  { font-size: 14.5px; line-height: 1.75; margin-bottom: 1.25rem; }

  .verdict-box {
    border-radius: var(--radius-md);
    padding: 14px 18px;
    margin-bottom: 1.25rem;
    font-size: 14px;
    line-height: 1.65;
  }

  .disclaimer {
    background: var(--gray-50);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-md);
    padding: 12px 16px;
    font-size: 12.5px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 1.5rem;
    font-style: italic;
  }

  .restart-wrap { text-align: center; }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">Diagnostic clinique express 😶</div>
  <h1>Êtes-vous (ou quelqu'un que vous connaissez) atteint du syndrome de Witzelsucht&nbsp;?</h1>
  <p>6 questions · résultats immédiats · cliniques dans notre tête, hilarantes dans la vôtre</p>
</div>

<div id="root"></div>

<script>
const questions = [
  {
    text: "En plein milieu d'une réunion sérieuse sur les chiffres du trimestre, quelqu'un glisse une blague de niveau CE2. Vous…",
    options: [
      { text: "Souriez poliment et revenez au sujet.", score: 0 },
      { text: "Rigolisez discrètement mais restez concentré(e).", score: 1 },
      { text: "Riez franchement — et en profitez pour en remettre une couche.", score: 2 },
      { text: "Étiez justement en train de préparer la même blague depuis dix minutes.", score: 3 }
    ]
  },
  {
    text: "Face à un jeu de mots raté (ou vraiment très mauvais), votre réaction naturelle est…",
    options: [
      { text: "Le silence poli. La dignité avant tout.", score: 0 },
      { text: "Un gémissement compatissant.", score: 1 },
      { text: "Un rire sincère — les mauvais jeux de mots, c'est votre genre.", score: 2 },
      { text: "Renchérir avec quelque chose d'encore pire, en étant fier(e).", score: 3 }
    ]
  },
  {
    text: "Aux enterrements ou aux réunions très tendues, vous avez tendance à…",
    options: [
      { text: "Rester sobre et adapté(e) au contexte.", score: 0 },
      { text: "Ressentir le besoin de détendre l'atmosphère, mais vous retenez.", score: 1 },
      { text: "Laisser parfois échapper une blague — avec remords immédiat.", score: 2 },
      { text: "Ne pas comprendre pourquoi votre blague a provoqué des regards horrifiés.", score: 3 }
    ]
  },
  {
    text: "Quand vous racontez une histoire drôle à quelqu'un qui n'a pas ri, vous…",
    options: [
      { text: "Passez à autre chose — l'humour, c'est subjectif.", score: 0 },
      { text: "Êtes légèrement déçu(e) mais vous en remettez.", score: 1 },
      { text: "Expliquez pourquoi c'était censé être drôle.", score: 2 },
      { text: "Répétez la blague en articulant mieux, persuadé(e) qu'ils n'ont pas bien entendu.", score: 3 }
    ]
  },
  {
    text: "Vos proches vous ont-ils déjà dit que vous faisiez trop de blagues ou que vous ne saviez pas sentir quand c'est le bon moment ?",
    options: [
      { text: "Jamais. Je suis un modèle de maîtrise sociale.", score: 0 },
      { text: "Une fois ou deux, lors de moments particulièrement stressants.", score: 1 },
      { text: "Régulièrement — et je ne comprends pas toujours pourquoi.", score: 2 },
      { text: "C'est pratiquement leur phrase d'accueil.", score: 3 }
    ]
  },
  {
    text: "Votre rapport au calembour (jeu de mots sur la sonorité des mots) est…",
    options: [
      { text: "Distant. Je préfère un humour plus élaboré.", score: 0 },
      { text: "Modéré — un bon calembour, pourquoi pas.", score: 1 },
      { text: "Enthousiaste — c'est l'une des formes d'esprit les plus pures.", score: 2 },
      { text: "Vital. C'est un besoin physiologique que je ne contrôle pas.", score: 3 }
    ]
  }
];

const profiles = [
  {
    min: 0, max: 4,
    icon: '🧠',
    iconBg: '#F0FDF4', iconColor: '#16A34A',
    title: 'Aucun symptôme détecté',
    sub: 'Vos lobes frontaux sont impeccables',
    color: '#16A34A', bgColor: '#F0FDF4', borderColor: '#BBF7D0',
    desc: "Vous faites preuve d'une excellente lecture du contexte social. Votre humour est mesuré, votre sens du timing intact. Vous n'êtes pas atteint du syndrome de Witzelsucht — ou alors vous vous soignez très bien.",
    verdict: 'Diagnostic : sain(e) comme un lobe frontal en vacances. 🌿'
  },
  {
    min: 5, max: 9,
    icon: '🙃',
    iconBg: '#FFFBEB', iconColor: '#D97706',
    title: 'Tendances witzelsuchtiques légères',
    sub: 'Quelques blagues de trop, mais encore récupérable',
    color: '#D97706', bgColor: '#FFFBEB', borderColor: '#FDE68A',
    desc: "Vous avez une bonne dose d'humour et un léger problème de filtre dans certaines situations. Ce n'est pas encore pathologique — mais vos collègues ont probablement appris à anticiper vos interventions en réunion.",
    verdict: 'Diagnostic : en observation. Évitez les enterrements sans chaperon. 🕵️'
  },
  {
    min: 10, max: 14,
    icon: '😅',
    iconBg: '#FFF7ED', iconColor: '#EA580C',
    title: 'Cas intermédiaire préoccupant',
    sub: 'Vos proches méritent une médaille',
    color: '#EA580C', bgColor: '#FFF7ED', borderColor: '#FED7AA',
    desc: "Vos lobes frontaux lèvent parfois les mains en l'air. L'humour est chez vous une réponse automatique à à peu près tout — le stress, le silence gêné, les funérailles. Vous riez encore le premier à vos propres blagues.",
    verdict: 'Diagnostic : stade 2. Consultez un neurologue — ou au minimum un ami honnête. 🫠'
  },
  {
    min: 15, max: 18,
    icon: '🎭',
    iconBg: '#FEF2F2', iconColor: '#DC2626',
    title: 'Syndrome de Witzelsucht confirmé',
    sub: '(dans le cadre de ce test absolument pas clinique)',
    color: '#DC2626', bgColor: '#FEF2F2', borderColor: '#FECACA',
    desc: "Félicitations : vous êtes officiellement l'incarnation vivante du syndrome décrit dans cet article. Vos jeux de mots sont incontrôlables, votre radar social fonctionne sur piles plates, et vous êtes probablement en train de préparer une blague sur ce résultat.",
    verdict: "Diagnostic : cas d'école. Nous vous demandons de ne pas envoyer ce résultat en plaisantant à vos collègues. (Vous allez le faire quand même.) 🎪"
  }
];

let current = 0;
let answers  = Array(questions.length).fill(null);

function getProfile(total) {
  return profiles.find(p => total >= p.min && total <= p.max) || profiles[profiles.length - 1];
}

function render() {
  const root = document.getElementById('root');

  if (current < questions.length) {
    const q   = questions[current];
    const pct = Math.round((current / questions.length) * 100);
    root.innerHTML = `
      <div class="progress-wrap">
        <span class="progress-label">Question ${current + 1} / ${questions.length}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="question">${q.text}</div>
      <div class="options">
        ${q.options.map((o, i) => `
          <button class="option${answers[current] === i ? ' selected' : ''}" onclick="select(${i})">${o.text}</button>
        `).join('')}
      </div>
      <div class="nav">
        <button class="btn" onclick="goBack()" ${current === 0 ? 'disabled' : ''}>← Précédent</button>
        <button class="btn btn-primary" onclick="goNext()" ${answers[current] === null ? 'disabled' : ''}>
          ${current === questions.length - 1 ? 'Voir le verdict' : 'Suivant →'}
        </button>
      </div>`;
  } else {
    const total = answers.reduce((s, i, qi) => s + (i !== null ? questions[qi].options[i].score : 0), 0);
    const p     = getProfile(total);

    root.innerHTML = `
      <div class="result">
        <div class="result-icon" style="background:${p.iconBg}">${p.icon}</div>
        <div class="result-title">${p.title}</div>
        <div class="result-sub">${p.sub}</div>
        <div class="result-desc">${p.desc}</div>
        <div class="verdict-box" style="background:${p.bgColor};border:1px solid ${p.borderColor};color:${p.color}">
          ${p.verdict}
        </div>
        <div class="disclaimer">
          Ce test est purement humoristique et éducatif. Le vrai syndrome de Witzelsucht est une condition neurologique sérieuse liée à des lésions du lobe frontal. Si vous observez des changements soudains et inexpliqués de comportement chez vous ou quelqu'un de proche, consultez un médecin.
        </div>
        <div class="restart-wrap">
          <button class="btn" onclick="restart()">↺ Recommencer</button>
        </div>
      </div>`;
  }

  notifyResize();
}

function select(i)  { answers[current] = i; render(); }
function goNext()   { if (answers[current] === null) return; current++; render(); }
function goBack()   { if (current > 0) { current--; render(); } }
function restart()  { current = 0; answers = Array(questions.length).fill(null); render(); }

function notifyResize() {
  setTimeout(function() {
    window.parent.postMessage({ type: 'quiz-resize', height: document.body.scrollHeight }, '*');
  }, 50);
}

render();
</script>
</body>
</html>
