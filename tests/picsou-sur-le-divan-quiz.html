<html lang="fr">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quel millionnaire êtes-vous ?</title>
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://ouipsycho.fr/articles/picsou-sur-le-divan/">
  <meta name="description" content="Thésauriseur, flambeur, compétiteur, sentimental ou grand cœur ? Découvrez votre vrai profil face à l'argent.">
  <style>
    :root{
      --navy:#1F4E6B; --navy-d:#163a50; --accent:#E8934A; --accent-d:#d97e33;
      --ink:#20303a; --muted:#5c7180; --bg:#f4f7f9; --card:#ffffff; --line:#e2e9ee;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg);color:var(--ink);line-height:1.55;padding:14px}
    .wrap{max-width:640px;margin:0 auto;background:var(--card);border:1px solid var(--line);
      border-radius:16px;overflow:hidden;box-shadow:0 8px 30px rgba(31,78,107,.08)}
    .head{background:linear-gradient(135deg,var(--navy),var(--navy-d));color:#fff;padding:22px 22px 18px}
    .head h1{font-size:1.28rem;line-height:1.25;letter-spacing:-.01em}
    .head p{opacity:.85;font-size:.9rem;margin-top:6px}
    .bar{height:7px;background:rgba(255,255,255,.22);border-radius:20px;margin-top:16px;overflow:hidden}
    .bar span{display:block;height:100%;width:0;background:var(--accent);border-radius:20px;transition:width .35s ease}
    .body{padding:22px}
    .count{font-size:.78rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--accent-d);margin-bottom:8px}
    .q{font-size:1.14rem;font-weight:700;color:var(--navy);margin-bottom:18px;line-height:1.35}
    .opt{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);
      border-radius:12px;padding:14px 16px;margin-bottom:11px;font-size:.97rem;color:var(--ink);
      cursor:pointer;transition:all .15s ease}
    .opt:hover{border-color:var(--navy);background:#f6fafc;transform:translateY(-1px)}
    .opt:active{transform:translateY(0)}
    .res{text-align:center;padding:8px 4px}
    .res .emoji{font-size:3.4rem;line-height:1;margin-bottom:6px}
    .res .kicker{font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent-d)}
    .res h2{font-size:1.5rem;color:var(--navy);margin:4px 0 14px}
    .res .desc{text-align:left;background:#f6fafc;border:1px solid var(--line);border-radius:12px;
      padding:16px 18px;font-size:.98rem;color:var(--ink)}
    .res .desc .twist{display:block;margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);
      color:var(--muted);font-size:.93rem}
    .share{margin:20px 0 6px}
    .share p{font-size:.82rem;color:var(--muted);margin-bottom:10px;font-weight:600}
    .share a{display:inline-block;margin:4px 5px;padding:9px 15px;border-radius:30px;
      font-size:.88rem;font-weight:600;text-decoration:none;color:#fff}
    .fb{background:#1877f2}.tw{background:#111}.wa{background:#25d366}
    .restart{margin-top:16px;background:var(--navy);color:#fff;border:none;border-radius:30px;
      padding:12px 26px;font-size:.95rem;font-weight:700;cursor:pointer;transition:background .15s}
    .restart:hover{background:var(--navy-d)}
    .disclaimer{margin-top:20px;background:#fff7ef;border:1px solid #f2dcc2;border-radius:12px;
      padding:14px 16px;font-size:.86rem;color:#6b5335;line-height:1.5}
    .disclaimer strong{color:#8a5a1e}
    @media(max-width:480px){.head h1{font-size:1.14rem}.q{font-size:1.05rem}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1>Quel millionnaire êtes-vous ?</h1>
      <p>6 questions pour révéler votre vrai rapport à l'argent.</p>
      <div class="bar"><span id="prog"></span></div>
    </div>
    <div class="body" id="app"></div>
  </div>

  <script>
    var PROFILES = {
      picsou: {emoji:"🦆", name:"Le Picsou",
        desc:"Vous adorez voir vos économies grossir et détestez vous en séparer : accumuler vous rassure profondément.",
        twist:"Le twist psy : mettre de côté procure un vrai sentiment de sécurité — mais l'argent qui dort ne rend pas plus heureux pour autant. Le luxe suprême, c'est parfois d'oser lâcher prise et d'en profiter."},
      flambeur: {emoji:"🎩", name:"Le Flambeur",
        desc:"Vous vivez l'instant et dépensez sans compter : pour vous, l'argent est fait pour tourner.",
        twist:"Le twist psy : profiter, c'est sain — mais l'adaptation hédonique émousse vite le plaisir d'achat. Un peu d'épargne, c'est surtout s'offrir de la tranquillité pour demain."},
      competiteur: {emoji:"⚔️", name:"Le Compétiteur",
        desc:"Être riche ne vous suffit pas : vous voulez être LE plus riche. La comparaison est votre moteur.",
        twist:"Le twist psy : la course au classement n'a jamais de ligne d'arrivée. Se comparer sans cesse est le chemin le plus sûr vers l'insatisfaction — même pour un milliardaire."},
      sentimental: {emoji:"💛", name:"Le Sentimental",
        desc:"Pour vous, l'argent compte moins que ce qu'il représente : souvenirs, sécurité des proches, petits trésors sans prix.",
        twist:"Le twist psy : donner du sens à l'argent est très sain. Veillez seulement à ne pas confondre valeur affective et valeur réelle — votre sou fétiche doit rester un plaisir, pas une prison."},
      genereux: {emoji:"🎁", name:"Le Grand Cœur",
        desc:"L'argent, pour vous, sert surtout à partager et à aider : votre portefeuille a le cœur sur la main.",
        twist:"Le twist psy : dépenser pour les autres rend réellement plus heureux, les études le confirment. À une condition : ne pas vous oublier, vous, sur la liste des gens à qui vous faites du bien."}
    };

    var QUESTIONS = [
      {q:"Vous gagnez soudain une grosse somme. Premier réflexe ?", o:[
        {t:"La mettre à l'abri et n'y toucher sous aucun prétexte.", p:"picsou"},
        {t:"Me faire plaisir tout de suite, la vie est courte !", p:"flambeur"},
        {t:"Vérifier si ça me place devant les autres.", p:"competiteur"},
        {t:"Penser à ce qu'elle représente pour mes proches.", p:"sentimental"},
        {t:"En partager une partie autour de moi.", p:"genereux"}]},
      {q:"Pour vous, l'argent, c'est avant tout…", o:[
        {t:"Une sécurité qu'on accumule.", p:"picsou"},
        {t:"Un moyen de profiter, maintenant.", p:"flambeur"},
        {t:"Un score, une façon de se situer.", p:"competiteur"},
        {t:"Un symbole, chargé d'histoire.", p:"sentimental"},
        {t:"Un outil pour aider et relier.", p:"genereux"}]},
      {q:"L'idée de perdre de l'argent vous…", o:[
        {t:"Est carrément insupportable.", p:"picsou"},
        {t:"N'empêche pas de dormir, ça revient.", p:"flambeur"},
        {t:"Angoisse surtout si un rival en profite.", p:"competiteur"},
        {t:"Touche selon ce que c'était, pas le montant.", p:"sentimental"},
        {t:"Dérange moins que de ne pas pouvoir aider.", p:"genereux"}]},
      {q:"Votre rapport à la dépense…", o:[
        {t:"Chaque euro sorti est un petit deuil.", p:"picsou"},
        {t:"Dépenser, c'est vivre !", p:"flambeur"},
        {t:"Je dépense pour montrer que je peux.", p:"competiteur"},
        {t:"J'achète surtout ce qui a du sens.", p:"sentimental"},
        {t:"Je dépense plus volontiers pour les autres.", p:"genereux"}]},
      {q:"Votre plus grande crainte financière ?", o:[
        {t:"Que mon trésor fonde.", p:"picsou"},
        {t:"Manquer au pire moment (mais bon…).", p:"flambeur"},
        {t:"Être dépassé par plus riche que moi.", p:"competiteur"},
        {t:"Perdre un objet irremplaçable.", p:"sentimental"},
        {t:"Ne plus pouvoir donner.", p:"genereux"}]},
      {q:"Le vrai luxe, pour vous, c'est…", o:[
        {t:"Voir mon capital grossir.", p:"picsou"},
        {t:"M'offrir tout, tout de suite.", p:"flambeur"},
        {t:"Être numéro un, point.", p:"competiteur"},
        {t:"Garder ce qui compte vraiment.", p:"sentimental"},
        {t:"Rendre les autres heureux.", p:"genereux"}]}
    ];

    var CANONICAL = "https://ouipsycho.fr/articles/picsou-sur-le-divan/";
    var idx = 0, scores = {};

    function notifyResize(){
      setTimeout(function(){
        window.parent.postMessage({type:'quiz-resize', height:document.body.scrollHeight}, '*');
      }, 50);
    }

    function shuffle(a){
      a = a.slice();
      for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
      return a;
    }

    function setProgress(pct){ document.getElementById('prog').style.width = pct + '%'; }

    function renderQuestion(){
      var cur = QUESTIONS[idx];
      var opts = shuffle(cur.o);
      var html = '<div class="count">Question ' + (idx+1) + ' / ' + QUESTIONS.length + '</div>';
      html += '<div class="q">' + cur.q + '</div>';
      opts.forEach(function(op){
        html += '<button class="opt" data-p="' + op.p + '">' + op.t + '</button>';
      });
      document.getElementById('app').innerHTML = html;
      setProgress(Math.round((idx/QUESTIONS.length)*100));
      document.querySelectorAll('.opt').forEach(function(b){
        b.addEventListener('click', function(){
          var p = this.getAttribute('data-p');
          scores[p] = (scores[p]||0) + 1;
          idx++;
          if(idx < QUESTIONS.length){ renderQuestion(); } else { renderResult(); }
          window.scrollTo(0,0);
          notifyResize();
        });
      });
      notifyResize();
    }

    function topProfile(){
      var best=null, max=-1;
      Object.keys(PROFILES).forEach(function(k){
        var v = scores[k]||0;
        if(v>max){max=v;best=k;}
      });
      return best;
    }

    function renderResult(){
      setProgress(100);
      var key = topProfile();
      var p = PROFILES[key];
      var shareText = encodeURIComponent("Je suis « " + p.name + " ». Et vous, quel millionnaire êtes-vous ? Faites le test sur Oui Psycho !");
      var url = encodeURIComponent(CANONICAL);
      var waText = encodeURIComponent("Je suis « " + p.name + " ». Et vous, quel millionnaire êtes-vous ? " + CANONICAL);

      var html = '<div class="res">';
      html += '<div class="emoji">' + p.emoji + '</div>';
      html += '<div class="kicker">Votre profil</div>';
      html += '<h2>' + p.name + '</h2>';
      html += '<div class="desc">' + p.desc + '<span class="twist">' + p.twist + '</span></div>';

      html += '<div class="share"><p>Partagez votre profil :</p>';
      html += '<a class="fb" href="https://www.facebook.com/sharer/sharer.php?u=' + url + '" target="_blank" rel="noopener">👍 Facebook</a>';
      html += '<a class="tw" href="https://twitter.com/intent/tweet?text=' + shareText + '&url=' + url + '" target="_blank" rel="noopener">🐦 Twitter</a>';
      html += '<a class="wa" href="https://wa.me/?text=' + waText + '" target="_blank" rel="noopener">💬 WhatsApp</a>';
      html += '</div>';

      html += '<button class="restart" id="again">↻ Recommencer</button>';

      html += '<div class="disclaimer">⚕️ <strong>Rappel important :</strong> Ce questionnaire est un outil de réflexion, pas un diagnostic. Seul un professionnel de santé peut évaluer votre situation. En cas de détresse, appelez le <strong>3114</strong> (gratuit, 24h/24).</div>';
      html += '</div>';

      document.getElementById('app').innerHTML = html;
      document.getElementById('again').addEventListener('click', function(){
        idx = 0; scores = {}; renderQuestion(); window.scrollTo(0,0); notifyResize();
      });
      notifyResize();
    }

    renderQuestion();
    window.addEventListener('load', notifyResize);
  </script>
</body>
</html>
