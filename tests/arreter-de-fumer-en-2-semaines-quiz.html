<title>Test : quel genre de fumeur es-tu ?</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:#1c1c1c;background:transparent;line-height:1.55}
  .quiz{max-width:560px;margin:0 auto;background:#f8faf5;border:1px solid #c8e0b8;border-radius:16px;padding:26px 24px}
  .progress{height:8px;background:#d0e8c0;border-radius:99px;overflow:hidden;margin-bottom:22px}
  .progress > span{display:block;height:100%;width:0;background:linear-gradient(90deg,#5cb85c,#2d7a2d);border-radius:99px;transition:width .35s ease}
  .step-info{font-size:.82rem;letter-spacing:.04em;text-transform:uppercase;color:#3d7a2a;margin-bottom:10px;font-weight:600}
  h2{font-size:1.22rem;line-height:1.38;margin-bottom:20px;color:#1a3d0a}
  .opt{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid #b8d8a8;color:#1c1c1c;border-radius:12px;padding:13px 16px;margin-bottom:11px;font-size:.97rem;cursor:pointer;transition:all .18s ease;font-family:inherit}
  .opt:hover{border-color:#5cb85c;background:#edf7e8;transform:translateY(-1px)}
  .intro{text-align:center}
  .emoji{font-size:2.6rem;display:block;margin-bottom:12px}
  .intro p{color:#3d7a2a;margin-bottom:20px;font-size:.97rem}
  .btn{display:inline-block;background:#2d7a2d;color:#fff;border:none;border-radius:99px;padding:13px 28px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .18s ease;font-family:inherit}
  .btn:hover{background:#1f5a1f}
  .result{text-align:center}
  .result .tag{display:inline-block;background:#d8efd0;color:#2d7a2d;border-radius:99px;padding:5px 14px;font-size:.8rem;font-weight:700;letter-spacing:.03em;text-transform:uppercase;margin-bottom:14px}
  .result h2{margin-bottom:8px;color:#1a3d0a}
  .result .sub{font-size:.88rem;color:#3d7a2a;margin-bottom:18px}
  .result .desc{text-align:left;background:#fff;border:1px solid #c8e0b8;border-radius:12px;padding:18px;margin-bottom:16px;font-size:.95rem;line-height:1.7}
  .insight{background:#f8faf5;border-radius:10px;padding:13px 16px;margin-bottom:12px;text-align:left}
  .insight-label{font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:#3d7a2a;margin-bottom:5px;font-weight:600}
  .insight-text{font-size:.93rem;line-height:1.65;color:#1c1c1c}
  .disclaimer{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:12px 15px;font-size:.85rem;color:#92400e;line-height:1.6;margin-bottom:16px;text-align:left}
  .restart{margin-top:6px;background:none;border:none;color:#3d7a2a;font-size:.92rem;cursor:pointer;text-decoration:underline;font-family:inherit}
  .restart:hover{color:#2d7a2d}
</style>
</head>
<body>
<div class="quiz" id="quiz"></div>
<script>
(function(){
  var questions=[
    {q:"Dans quelles circonstances allumes-tu le plus souvent une cigarette ?",
     a:[{t:"Quand je suis avec des amis, en terrasse ou après un verre.",p:"S"},
        {t:"Quand je suis stressé(e), anxieux(se) ou triste.",p:"E"},
        {t:"Par réflexe : après le café, en sortant du métro, sans vraiment y penser.",p:"A"},
        {t:"J'ai besoin de fumer régulièrement — le manque physique arrive vite.",p:"D"}]},
    {q:"Si tu ne pouvais fumer que seul(e), dans ton coin, sans personne autour…",
     a:[{t:"Ça perdrait beaucoup de son attrait — c'est lié au moment partagé.",p:"S"},
        {t:"Ça ne changerait rien — c'est pour moi que je fume.",p:"E"},
        {t:"Je fumerais pareil — c'est une habitude intégrée.",p:"A"},
        {t:"Je fumerais toujours — le besoin physique est là de toute façon.",p:"D"}]},
    {q:"Quand tu arrêtes de fumer quelques heures (travail, avion…), tu ressens…",
     a:[{t:"Pas grand-chose — je n'y pense pas si je suis occupé(e).",p:"S"},
        {t:"De l'irritabilité ou un vague sentiment de vide émotionnel.",p:"E"},
        {t:"Une envie automatique aux heures habituelles, sans vraie détresse.",p:"A"},
        {t:"Un besoin physique réel : agitation, difficulté à me concentrer.",p:"D"}]},
    {q:"Pourquoi as-tu commencé à fumer, à l'époque ?",
     a:[{t:"Pour faire partie d'un groupe, par curiosité sociale.",p:"S"},
        {t:"Pour gérer un moment difficile ou des émotions intenses.",p:"E"},
        {t:"Ça s'est installé progressivement, sans vraie décision consciente.",p:"A"},
        {t:"J'aimais l'effet — la tête légère, la détente physique.",p:"D"}]},
    {q:"Quand tu imagines ne plus fumer, qu'est-ce qui te manquerait le plus ?",
     a:[{t:"Les pauses fumeurs, les moments de connivence que ça crée.",p:"S"},
        {t:"La soupape — la cigarette quand ça ne va pas.",p:"E"},
        {t:"Le rituel lui-même : le geste, la pause, la répétition.",p:"A"},
        {t:"L'effet immédiat sur mon corps, la détente que ça procure.",p:"D"}]},
    {q:"As-tu déjà essayé d'arrêter ? Si oui, qu'est-ce qui t'a fait reprendre ?",
     a:[{t:"Une soirée, un apéro — difficile de refuser quand tout le monde fume.",p:"S"},
        {t:"Une période de stress ou d'émotion intense.",p:"E"},
        {t:"L'automatisme a repris sans que je m'en rende compte.",p:"A"},
        {t:"Le manque physique était trop fort — j'étais irritable, je ne dormais plus.",p:"D"}]},
    {q:"Ce qui te semble le plus dur dans l'arrêt du tabac ?",
     a:[{t:"Gérer les situations sociales où tout le monde fume.",p:"S"},
        {t:"Trouver autre chose pour gérer mes émotions difficiles.",p:"E"},
        {t:"Casser les routines ancrées dans mon quotidien.",p:"A"},
        {t:"Passer le cap physique des premiers jours.",p:"D"}]}
  ];

  var profiles={
    S:{emoji:"🤝",tag:"Fumeur social",name:"Le Fumeur Social",
       sub:"C'est le lien, pas la nicotine",
       desc:"Tu fumes d'abord pour les moments partagés — la pause café avec les collègues, le balcon en soirée, la complicité que ça crée. La cigarette est un code social avant d'être une dépendance chimique. Ce profil a l'avantage d'un ancrage physique souvent moins fort — mais l'entourage peut vite redevenir un déclencheur.",
       insight:"Ta principale difficulté ne sera pas le manque de nicotine, mais de trouver comment rester présent dans ces moments sociaux sans cigarette en main. Le piège classique : la première soirée entre amis fumeurs.",
       action:"Stratégie clé : anticiper les contextes à risque et trouver un substitut de contenance (boisson, manipulation d'un objet). Prévenir ton entourage que tu arrêtes est aussi une protection très efficace."},
    E:{emoji:"💭",tag:"Fumeur émotionnel",name:"Le Fumeur Émotionnel",
       sub:"La cigarette comme régulateur d'humeur",
       desc:"Tu fumes pour gérer ce que tu ressens — le stress, l'anxiété, la tristesse, parfois la joie intense. La cigarette est devenue une façon de réguler tes états émotionnels. Ce n'est pas un manque de volonté : c'est un mécanisme de coping que le cerveau a appris à associer à la nicotine.",
       insight:"Arrêter de fumer sans adresser la gestion émotionnelle, c'est retirer une béquille sans rien mettre à la place. Ça peut marcher — mais les rechutes arrivent souvent aux moments de pic émotionnel.",
       action:"Investis dans des alternatives de régulation émotionnelle avant d'arrêter : respiration lente, sport, TCC. L'accompagnement thérapeutique peut être particulièrement utile pour ce profil."},
    A:{emoji:"⏰",tag:"Fumeur automatique",name:"Le Fumeur Automatique",
       sub:"L'habitude avant tout",
       desc:"Tu fumes par réflexe, selon des routines précises intégrées à ton quotidien. La cigarette s'est glissée dans les interstices de ta journée : après le café, avec le journal, en attendant le bus. Tu n'y penses même plus — c'est ça le piège.",
       insight:"Ton cerveau a créé des associations stimulus-réponse puissantes. Ce n'est pas de la faiblesse — c'est de l'apprentissage conditionné. La bonne nouvelle : ces circuits peuvent être recâblés avec de la régularité et des substituts de routine.",
       action:"Identifie tes 3 à 5 déclencheurs principaux et prépare une réponse alternative pour chacun (chewing-gum, courte marche, verre d'eau). Casser les routines une par une est souvent plus efficace que le sevrage total immédiat."},
    D:{emoji:"🔗",tag:"Fumeur dépendant",name:"Le Fumeur Dépendant",
       sub:"Le corps a pris la main",
       desc:"Ta dépendance est d'abord physique : la nicotine a modifié le fonctionnement de tes récepteurs cérébraux, et le manque se manifeste rapidement de façon concrète — agitation, irritabilité, difficultés de concentration. Ce n'est pas dans ta tête : c'est de la neurobiologie.",
       insight:"Ce profil bénéficie le plus des substituts nicotiniques (patches, gommes, inhalateur) et des traitements médicamenteux disponibles sur ordonnance. L'approche uniquement volontariste a un taux d'échec élevé pour ce profil — et c'est normal.",
       action:"Consulte ton médecin traitant avant d'arrêter. Les substituts nicotiniques divisent par deux le risque de rechute. Le manque physique intense dure en général entre 3 et 7 jours — c'est difficile, mais c'est court."}
  };

  var box=document.getElementById('quiz');
  var step=-1; var answers=[];

  function notifyResize(){
    setTimeout(function(){
      window.parent.postMessage({type:'quiz-resize',height:document.body.scrollHeight},'*');
    },50);
  }

  function renderIntro(){
    box.innerHTML='<div class="intro"><span class="emoji">🚭</span>'+
      '<h2>Quel genre de fumeur es-tu&nbsp;?</h2>'+
      '<p>Social, émotionnel, automatique ou dépendant ? 7 questions pour identifier ton profil — et repartir avec des conseils d\'arrêt vraiment adaptés à ta situation.</p>'+
      '<button class="btn" id="start">Commencer le test</button></div>';
    document.getElementById('start').onclick=function(){step=0;answers=[];renderQ();};
    notifyResize();
  }

  function renderQ(){
    var item=questions[step];
    var pct=Math.round((step/questions.length)*100);
    var html='<div class="progress"><span style="width:'+pct+'%"></span></div>'+
      '<div class="step-info">Question '+(step+1)+' / '+questions.length+'</div>'+
      '<h2>'+item.q+'</h2>';
    for(var i=0;i<item.a.length;i++){
      html+='<button class="opt" data-p="'+item.a[i].p+'">'+item.a[i].t+'</button>';
    }
    box.innerHTML=html;
    var opts=box.querySelectorAll('.opt');
    for(var j=0;j<opts.length;j++){
      opts[j].onclick=function(){
        answers.push(this.getAttribute('data-p'));
        step++;
        if(step<questions.length){renderQ();}else{renderResult();}
      };
    }
    notifyResize();
  }

  function renderResult(){
    var counts={S:0,E:0,A:0,D:0};
    for(var i=0;i<answers.length;i++){counts[answers[i]]++;}
    var best='S',max=-1,order=['S','E','A','D'];
    for(var k=0;k<order.length;k++){if(counts[order[k]]>max){max=counts[order[k]];best=order[k];}}
    var p=profiles[best];
    box.innerHTML='<div class="result">'+
      '<div class="progress"><span style="width:100%"></span></div>'+
      '<span class="emoji">'+p.emoji+'</span>'+
      '<span class="tag">'+p.tag+'</span>'+
      '<h2>'+p.name+'</h2>'+
      '<div class="sub">'+p.sub+'</div>'+
      '<div class="desc">'+p.desc+'</div>'+
      '<div class="insight"><div class="insight-label">🔍 Ce que ça dit</div><div class="insight-text">'+p.insight+'</div></div>'+
      '<div class="insight"><div class="insight-label">🛠️ Stratégie adaptée à ton profil</div><div class="insight-text">'+p.action+'</div></div>'+
      '<div class="disclaimer">⚕️ <strong>Important :</strong> Ce test est un outil de réflexion, pas un outil médical. Pour un accompagnement au sevrage tabagique, parle à ton médecin ou appelle le <strong>3989</strong> (Tabac Info Service, gratuit).</div>'+
      '<button class="restart" id="again">↺ Recommencer</button>';
    document.getElementById('again').onclick=renderIntro;
    notifyResize();
  }

  renderIntro();
  window.addEventListener('load',notifyResize);
})();
</script>
</body>
</html>
