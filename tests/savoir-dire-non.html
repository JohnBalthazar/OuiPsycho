<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test : savez-vous vraiment dire non ? — Oui Psycho!</title>
<meta name="description" content="Testez votre assertivité sur 10 situations du quotidien et découvrez votre profil TCC. Un test gratuit et immédiat signé Oui Psycho!">
<meta name="theme-color" content="#1F4E6B">
<link rel="canonical" href="https://ouipsycho.fr/tests/savoir-dire-non.html">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:      #1F4E6B;
    --blue-dark: #133347;
    --blue-50:   #EAF3F8;
    --green:     #16A34A;
    --green-50:  #F0FDF4;
    --green-200: #BBF7D0;
    --yellow:    #CA8A04;
    --yellow-50: #FEFCE8;
    --yellow-200:#FEF08A;
    --orange:    #EA580C;
    --orange-50: #FFF7ED;
    --orange-200:#FED7AA;
    --red:       #DC2626;
    --red-50:    #FEF2F2;
    --red-200:   #FECACA;
    --gray-50:   #F9FAFB;
    --gray-200:  #E5E7EB;
    --text:      #1a1a1a;
    --text-muted:#6b6b6b;
    --border:    rgba(0,0,0,0.10);
    --border-h:  rgba(0,0,0,0.22);
    --bg:        #ffffff;
    --bg-sec:    #faf9f6;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    padding: 2rem 1.5rem 3rem;
    max-width: 640px;
    margin: 0 auto;
  }

  .header { text-align: center; margin-bottom: 2rem; }
  .header-badge {
    display: inline-block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--blue);
    background: var(--blue-50);
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 0.75rem;
  }
  .header h1 { font-size: 20px; font-weight: 600; line-height: 1.4; }
  .header p  { font-size: 13px; color: var(--text-muted); margin-top: 0.5rem; }

  .progress-wrap { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
  .progress-label { font-size: 12px; color: var(--text-muted); }
  .progress-bar   { height: 5px; background: var(--border); border-radius: 3px; margin-bottom: 1.75rem; overflow: hidden; }
  .progress-fill  { height: 100%; background: var(--blue); border-radius: 3px; transition: width 0.4s ease; }

  .stage { animation: fade 0.4s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .q-context {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--blue);
    background: var(--blue-50);
    padding: 3px 10px;
    border-radius: 14px;
    margin-bottom: 0.7rem;
  }
  .question { font-size: 16.5px; font-weight: 500; margin-bottom: 1.25rem; line-height: 1.55; }

  .options { display: flex; flex-direction: column; gap: 9px; margin-bottom: 1.75rem; }
  .option {
    background: var(--bg);
    border: 0.5px solid var(--border-h);
    border-radius: var(--radius-lg);
    padding: 13px 16px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
    font-family: inherit;
    line-height: 1.5;
  }
  .option:hover    { border-color: var(--blue); background: var(--blue-50); }
  .option.selected { border: 2px solid var(--blue); background: var(--blue-50); color: var(--blue-dark); font-weight: 600; }

  .nav { display: flex; justify-content: space-between; }
  .btn {
    background: transparent;
    border: 0.5px solid var(--border-h);
    border-radius: var(--radius-md);
    padding: 10px 22px;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn:hover    { background: var(--bg-sec); }
  .btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
  .btn-primary  { background: var(--blue); color: #fff; border-color: var(--blue); }
  .btn-primary:hover { background: var(--blue-dark); }

  .result { animation: fade 0.45s ease; text-align: center; }
  .result-icon  { width: 88px; height: 88px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 1.1rem; }
  .result-score { font-size: 46px; font-weight: 800; line-height: 1; margin-bottom: 0.15rem; }
  .result-score span { font-size: 20px; font-weight: 600; color: var(--text-muted); }
  .result-title { font-size: 23px; font-weight: 700; margin-bottom: 1.25rem; }
  .result-desc  { font-size: 15px; line-height: 1.75; text-align: left; margin-bottom: 1.5rem; }

  .actions { display: flex; flex-direction: column; gap: 0.7rem; margin-bottom: 1.5rem; }
  .copy-status { font-size: 12.5px; color: var(--green); min-height: 16px; margin-bottom: 0.5rem; }

  .article-link {
    display: block;
    background: var(--blue-50);
    border-radius: var(--radius-md);
    padding: 14px 18px;
    text-decoration: none;
    color: var(--blue);
    font-weight: 700;
    font-size: 14.5px;
    margin-bottom: 1.5rem;
    transition: background 0.15s;
  }
  .article-link:hover { background: #dcebf4; }

  .disclaimer {
    background: var(--gray-50);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-md);
    padding: 12px 16px;
    font-size: 12.5px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 1.5rem;
    font-style: italic;
    text-align: left;
  }

  .all-tests { text-align: center; }
  .all-tests a { color: var(--text-muted); text-decoration: none; font-size: 13.5px; }
  .all-tests a:hover { color: var(--blue); }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">Test d'assertivité 🚫</div>
  <h1>Savez-vous vraiment dire non&nbsp;?</h1>
  <p>10 situations du quotidien · résultats immédiats · approche TCC</p>
</div>

<div id="root"></div>

<script>
const questions = [
  {
    context: "Famille",
    text: "Ta mère te demande de venir dîner ce week-end alors que tu avais prévu de te reposer.",
    options: [
      { text: "J'annule mes plans, on ne déçoit pas sa mère.", score: 0 },
      { text: "Je lui explique calmement que je suis épuisé·e et que je viendrai le week-end prochain.", score: 3 },
      { text: "Je lui dis que je ne lui dois pas d'explications.", score: 1 },
      { text: "J'accepte en me disant que je ronchonnerai tout le repas.", score: 0 }
    ]
  },
  {
    context: "Travail",
    text: "Ton chef te demande de rester 2h de plus un vendredi soir, sans préavis.",
    options: [
      { text: "Je soupire mais je reste — on ne refuse pas son chef.", score: 0 },
      { text: "Je lui dis fermement que c'est hors de question.", score: 1 },
      { text: "Je lui explique que j'ai un engagement et que je peux traiter ça lundi.", score: 3 },
      { text: "Je reste mais je travaille à moitié pour protester.", score: 0 }
    ]
  },
  {
    context: "Couple",
    text: "Ton/ta partenaire insiste pour regarder un film alors que tu es épuisé·e.",
    options: [
      { text: "Je reste éveillé·e même si je m'endors à moitié.", score: 0 },
      { text: "Je lui dis clairement que je suis fatigué·e et que je vais dormir.", score: 3 },
      { text: "Je soupire bruyamment et je vais dans l'autre pièce sans rien dire.", score: 1 },
      { text: "Je regarde le film en boudant.", score: 0 }
    ]
  },
  {
    context: "Amis",
    text: "Ton meilleur ami·e te demande de l'aider à déménager un samedi, mais tu avais prévu du temps pour toi.",
    options: [
      { text: "J'y vais, l'amitié avant tout.", score: 0 },
      { text: "Je lui dis que je ne peux pas ce samedi mais que je suis disponible un autre jour.", score: 3 },
      { text: "Je lui demande si ça ne lui est pas venu à l'idée de me prévenir plus tôt.", score: 1 },
      { text: "J'invente une excuse pour ne pas paraître égoïste.", score: 1 }
    ]
  },
  {
    context: "En société",
    text: "Un vendeur très insistant te propose une offre que tu ne veux vraiment pas.",
    options: [
      { text: "J'écoute tout le discours puis j'achète pour éviter la gêne.", score: 0 },
      { text: "Je prétexte que je n'ai pas mon portefeuille.", score: 1 },
      { text: "Je lui coupe la parole et je pars sans un mot.", score: 1 },
      { text: "Je lui dis calmement mais fermement : « Non merci, ça ne m'intéresse pas. »", score: 3 }
    ]
  },
  {
    context: "Famille",
    text: "Ton frère te demande d'emprunter 200€ pour « quelques jours » — c'est la 3ème fois.",
    options: [
      { text: "Je lui prête encore, c'est ma famille.", score: 0 },
      { text: "Je lui explique calmement que je ne peux plus lui prêter d'argent.", score: 3 },
      { text: "Je lui demande de rembourser d'abord, assez fort pour que tout le monde entende.", score: 1 },
      { text: "Je prétends ne pas avoir d'argent pour éviter le conflit.", score: 1 }
    ]
  },
  {
    context: "Travail",
    text: "Un·e collègue te délègue régulièrement ses dossiers car « tu fais ça mieux que lui/elle ».",
    options: [
      { text: "J'accepte, flatté·e par le compliment.", score: 0 },
      { text: "J'accepte encore cette fois mais je rumine.", score: 0 },
      { text: "Je lui remets ses dossiers sur le bureau sans un mot.", score: 1 },
      { text: "Je lui demande de gérer ses propres dossiers et d'en parler au manager si ça continue.", score: 3 }
    ]
  },
  {
    context: "Couple",
    text: "Ton/ta partenaire veut inviter des amis ce week-end alors que tu avais besoin de calme.",
    options: [
      { text: "J'accepte en me sacrifiant, je m'isolerai dans ma chambre.", score: 0 },
      { text: "Je propose un compromis : soit un autre week-end, soit une soirée courte.", score: 3 },
      { text: "Je dis que je sortirai ce soir-là pour les laisser entre eux.", score: 1 },
      { text: "Je boude jusqu'à ce qu'il/elle comprenne.", score: 0 }
    ]
  },
  {
    context: "Amis",
    text: "Ton groupe de copains te pousse à sortir alors que tu n'en as vraiment pas envie.",
    options: [
      { text: "J'y vais pour ne pas être en dehors du groupe.", score: 0 },
      { text: "J'y vais mais je prétexte un mal de tête pour partir tôt.", score: 1 },
      { text: "Je leur dis calmement que je suis fatigué·e et que je passe la soirée chez moi.", score: 3 },
      { text: "Je m'énerve un peu et leur dis qu'ils peuvent faire sans moi.", score: 1 }
    ]
  },
  {
    context: "En société",
    text: "Quelqu'un te coupe la parole en réunion ou dans une conversation de groupe.",
    options: [
      { text: "J'attends mon tour en espérant qu'on me redonne la parole.", score: 0 },
      { text: "Je dis calmement : « Je n'avais pas fini, je reprends… »", score: 3 },
      { text: "J'élève la voix pour me faire entendre.", score: 1 },
      { text: "J'abandonne — ce n'était sûrement pas si important.", score: 0 }
    ]
  }
];

const profiles = [
  {
    min: 25, max: 30,
    icon: '🟢',
    iconBg: 'var(--green-50)', color: 'var(--green)',
    title: 'Assertif·ve confirmé·e',
    desc: "Vous exprimez vos besoins clairement et sans agressivité. C'est une compétence précieuse que peu de personnes maîtrisent vraiment."
  },
  {
    min: 18, max: 24,
    icon: '🟡',
    iconBg: 'var(--yellow-50)', color: 'var(--yellow)',
    title: 'En bonne voie',
    desc: "Vous savez généralement vous affirmer, mais certaines situations (surtout en famille ou en couple) peuvent encore vous bloquer."
  },
  {
    min: 10, max: 17,
    icon: '🟠',
    iconBg: 'var(--orange-50)', color: 'var(--orange)',
    title: 'Quelques blocages',
    desc: "Vous avez tendance à accepter pour éviter les conflits. La bonne nouvelle : l'assertivité s'apprend, et les TCC sont très efficaces pour ça."
  },
  {
    min: 0, max: 9,
    icon: '🔴',
    iconBg: 'var(--red-50)', color: 'var(--red)',
    title: "Le « non » vous fait peur",
    desc: "Dire non vous coûte énormément. Vous privilégiez la paix au détriment de vos besoins. Un travail thérapeutique peut vraiment transformer votre quotidien."
  }
];

let current = 0;
let answers  = Array(questions.length).fill(null);

function getProfile(total) {
  return profiles.find(p => total >= p.min && total <= p.max) || profiles[profiles.length - 1];
}

function render() {
  const root = document.getElementById('root');

  if (current < questions.length) {
    const q   = questions[current];
    const pct = Math.round((current / questions.length) * 100);
    root.innerHTML = `
      <div class="stage">
        <div class="progress-wrap">
          <span class="progress-label">Question ${current + 1} / ${questions.length}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="q-context">${q.context}</div>
        <div class="question">${q.text}</div>
        <div class="options">
          ${q.options.map((o, i) => `
            <button class="option${answers[current] === i ? ' selected' : ''}" onclick="select(${i})">${o.text}</button>
          `).join('')}
        </div>
        <div class="nav">
          <button class="btn" onclick="goBack()" ${current === 0 ? 'disabled' : ''}>← Précédent</button>
          <button class="btn btn-primary" onclick="goNext()" ${answers[current] === null ? 'disabled' : ''}>
            ${current === questions.length - 1 ? 'Voir mon résultat' : 'Suivant →'}
          </button>
        </div>
      </div>`;
  } else {
    const total   = answers.reduce((s, i, qi) => s + (i !== null ? questions[qi].options[i].score : 0), 0);
    const p       = getProfile(total);
    const score100 = Math.round((total / 30) * 100);

    root.innerHTML = `
      <div class="result">
        <div class="result-icon" style="background:${p.iconBg}">${p.icon}</div>
        <div class="result-score" style="color:${p.color}">${score100}<span>/100</span></div>
        <div class="result-title">${p.title}</div>
        <div class="result-desc">${p.desc}</div>
        <a class="article-link" href="../../articles/therapie-cognitive-comportementale/">En savoir plus sur les TCC →</a>
        <div class="copy-status" id="copy-status"></div>
        <div class="actions">
          <button class="btn btn-primary" onclick="copyResult(${score100})">📋 Copier mon résultat</button>
          <button class="btn" onclick="restart()">↺ Recommencer</button>
        </div>
        <div class="disclaimer">
          Ce test est un outil de sensibilisation et ne constitue pas un diagnostic. L'assertivité se travaille, notamment grâce aux thérapies cognitivo-comportementales (TCC). Si le sujet vous touche, un·e professionnel·le peut vous accompagner.
        </div>
        <div class="all-tests">
          <a href="../tests.html">← Tous les tests</a>
        </div>
      </div>`;
  }

  notifyResize();
}

function select(i)  { answers[current] = i; render(); }
function goNext()   { if (answers[current] === null) return; current++; render(); }
function goBack()   { if (current > 0) { current--; render(); } }
function restart()  { current = 0; answers = Array(questions.length).fill(null); render(); }

function copyResult(score100) {
  const total = answers.reduce((s, i, qi) => s + (i !== null ? questions[qi].options[i].score : 0), 0);
  const p = getProfile(total);
  const txt = `J'ai obtenu ${score100}/100 au test « Savez-vous dire non ? » sur Oui Psycho! 🧠 Mon profil : ${p.title}. Et toi ? https://ouipsycho.fr/tests/savoir-dire-non.html`;
  const done = () => {
    const el = document.getElementById('copy-status');
    if (el) el.textContent = '✓ Résultat copié dans le presse-papier !';
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(done).catch(() => fallbackCopy(txt, done));
  } else {
    fallbackCopy(txt, done);
  }
}

function fallbackCopy(txt, done) {
  const ta = document.createElement('textarea');
  ta.value = txt;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); done(); } catch (e) {}
  document.body.removeChild(ta);
}

function notifyResize() {
  setTimeout(function() {
    window.parent.postMessage({ type: 'quiz-resize', height: document.body.scrollHeight }, '*');
  }, 50);
}

render();
</script>
</body>
</html>
