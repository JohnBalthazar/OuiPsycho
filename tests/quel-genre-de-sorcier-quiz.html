<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quel genre de sorcier etes-vous ?</title>
<style>
  :root{
    --card:#ffffff; --ink:#383040; --muted:#8a8290; --line:#efe7ee;
    --plum:#9b7cb8; --plum-d:#7d5f9c; --peach:#f3e6f1; --gold:#e9b872;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
       color:var(--ink);background:transparent;line-height:1.55;}
  .wrap{max-width:560px;margin:0 auto;padding:4px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;
        padding:24px 22px;box-shadow:0 8px 30px rgba(150,130,160,.12);}
  .progress{height:6px;background:var(--peach);border-radius:99px;overflow:hidden;margin-bottom:18px;}
  .bar{height:100%;width:0;background:linear-gradient(90deg,var(--plum),var(--gold));
       border-radius:99px;transition:width .35s ease;}
  .step{font-size:.78rem;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  h1{font-size:1.18rem;margin:0 0 18px;line-height:1.35;}
  .opt{display:block;width:100%;text-align:left;border:1.5px solid var(--line);
       background:#fff;color:var(--ink);padding:13px 15px;border-radius:12px;margin:9px 0;
       font-size:.97rem;cursor:pointer;transition:all .15s ease;}
  .opt:hover{border-color:var(--plum);background:#faf6fb;transform:translateY(-1px);}
  .res-emoji{font-size:2.6rem;line-height:1;margin-bottom:6px;}
  .res-title{font-size:1.35rem;font-weight:700;margin:2px 0 4px;color:var(--plum-d);}
  .res-tag{display:inline-block;font-size:.78rem;color:var(--muted);
           background:var(--peach);padding:4px 10px;border-radius:99px;margin-bottom:14px;}
  .res-text{font-size:.97rem;color:var(--ink);}
  .res-text strong{color:var(--plum-d);}
  .again{margin-top:20px;display:inline-flex;align-items:center;gap:8px;border:none;
         background:linear-gradient(90deg,var(--plum),var(--plum-d));color:#fff;
         padding:11px 20px;border-radius:99px;font-size:.92rem;font-weight:600;cursor:pointer;}
  .again:hover{filter:brightness(1.05);}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="progress"><div class="bar" id="bar"></div></div>
    <div id="quiz"></div>
  </div>
</div>
<script>
var QUESTIONS=[
 {q:"Quand un proche souffre, vous...",a:[
   ["veillez sur lui dans l'ombre, sans en faire etalage","protecteur"],
   ["cherchez a comprendre ce qui se passe vraiment","erudit"],
   ["l'ecoutez et le reconfortez avec chaleur","coeur"],
   ["bousculez les choses pour le sortir de la","franc"]]},
 {q:"Votre plus grande force ?",a:[
   ["votre loyaute indefectible","protecteur"],
   ["votre soif d'apprendre","erudit"],
   ["votre empathie","coeur"],
   ["votre independance","franc"]]},
 {q:"On vous reproche parfois...",a:[
   ["d'etre trop secret","protecteur"],
   ["de vous perdre dans vos pensees","erudit"],
   ["de trop vous oublier pour les autres","coeur"],
   ["de n'en faire qu'a votre tete","franc"]]},
 {q:"Face a l'injustice, vous...",a:[
   ["agissez en coulisses, efficacement","protecteur"],
   ["analysez pour trouver la faille","erudit"],
   ["prenez la defense des plus fragiles","coeur"],
   ["vous dressez ouvertement contre elle","franc"]]},
 {q:"Votre idee du courage ?",a:[
   ["proteger sans attendre de reconnaissance","protecteur"],
   ["regarder la verite en face","erudit"],
   ["aimer malgre le risque d'etre blesse","coeur"],
   ["refuser de se soumettre","franc"]]},
 {q:"Votre devise secrete ?",a:[
   ["\"Je veille, meme si nul ne le sait\"","protecteur"],
   ["\"Comprendre, c'est deja avancer\"","erudit"],
   ["\"On ne voit bien qu'avec le coeur\"","coeur"],
   ["\"Mes regles, mon chemin\"","franc"]]}
];
var RESULTS={
 protecteur:{emoji:"\uD83D\uDEE1\uFE0F",title:"Le Protecteur de l'ombre",tag:"loyaute & sacrifice",
   text:"Vous veillez sans rien attendre en retour, avec un courage qui ne fait pas de bruit, facon Rogue dans ce qu'il a de plus noble. <strong>Loyal, fiable, devoue</strong>, vous etes le rempart discret sur lequel les autres comptent. Votre vigilance : a force de proteger sans jamais vous ouvrir, on finit seul derriere son armure. Vous aussi avez le droit d'etre vu, et aide."},
 erudit:{emoji:"\uD83D\uDCD6",title:"L'Erudit passionne",tag:"savoir & maitrise",
   text:"Votre magie, c'est la connaissance. <strong>Curieux, fin, exigeant</strong>, vous voulez comprendre avant d'agir, et cette lucidite est une vraie force. Le piege du grand sorcier studieux : croire que tout se resout par l'analyse. Le savoir eclaire, mais il ne remplace pas le lien aux autres. Pensez aussi a sortir du grimoire."},
 coeur:{emoji:"\uD83D\uDC9B",title:"Le Coeur bienveillant",tag:"empathie & lien",
   text:"Vous ressentez tout, et vous le mettez au service des autres. <strong>Empathique, chaleureux, protecteur</strong>, vous prenez naturellement la defense des plus fragiles. Magnifique don. Le revers classique : s'oublier soi-meme. Un bon sorcier du coeur garde un peu de sa magie pour se soigner lui aussi."},
 franc:{emoji:"\uD83D\uDD25",title:"Le Franc-tireur",tag:"audace & liberte",
   text:"Vous tracez votre voie, quitte a bousculer les regles. <strong>Independant, audacieux, fidele a vous-meme</strong>, vous refusez de vous soumettre, et ca force le respect. Le revers : l'autonomie peut glisser vers l'isolement. Meme le sorcier le plus libre va plus loin quand il accepte, parfois, de s'appuyer sur les autres."}
};
var idx=0, scores={protecteur:0,erudit:0,coeur:0,franc:0};

function notifyResize(){setTimeout(function(){
  window.parent.postMessage({type:'quiz-resize',height:document.body.scrollHeight},'*');
},50);}

function render(){
  document.getElementById('bar').style.width=((idx)/QUESTIONS.length*100)+'%';
  var q=QUESTIONS[idx], html='';
  html+='<div class="step">Question '+(idx+1)+' / '+QUESTIONS.length+'</div>';
  html+='<h1>'+q.q+'</h1>';
  for(var i=0;i<q.a.length;i++){
    html+='<button class="opt" onclick="answer(\''+q.a[i][1]+'\')">'+q.a[i][0]+'</button>';
  }
  document.getElementById('quiz').innerHTML=html;
  notifyResize();
}
function answer(type){scores[type]++;idx++;if(idx<QUESTIONS.length){render();}else{showResult();}}
function showResult(){
  document.getElementById('bar').style.width='100%';
  var best='protecteur',max=-1;
  ['protecteur','erudit','coeur','franc'].forEach(function(k){if(scores[k]>max){max=scores[k];best=k;}});
  var r=RESULTS[best];
  var html='<div style="text-align:center">';
  html+='<div class="res-emoji">'+r.emoji+'</div>';
  html+='<div class="res-title">'+r.title+'</div>';
  html+='<span class="res-tag">'+r.tag+'</span></div>';
  html+='<p class="res-text">'+r.text+'</p>';
  html+='<div style="text-align:center"><button class="again" onclick="restart()">\u21BA Refaire le test</button></div>';
  document.getElementById('quiz').innerHTML=html;
  notifyResize();
}
function restart(){idx=0;scores={protecteur:0,erudit:0,coeur:0,franc:0};render();}
render();
window.addEventListener('load',notifyResize);
</script>
</body>
</html>
