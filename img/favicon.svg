<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">

  <!-- === Rayons lumineux (top) === -->
  <g stroke-linecap="round">
    <line x1="70"  y1="68"  x2="56"  y2="50"  stroke="#4EC9A4" stroke-width="5.5"/>
    <line x1="83"  y1="57"  x2="76"  y2="40"  stroke="#7DC864" stroke-width="5.5"/>
    <line x1="95"  y1="51"  x2="91"  y2="34"  stroke="#B4D44A" stroke-width="5.5"/>
    <line x1="108" y1="49"  x2="108" y2="32"  stroke="#F5C840" stroke-width="5.5"/>
    <line x1="121" y1="51"  x2="125" y2="34"  stroke="#F5A040" stroke-width="5.5"/>
    <line x1="133" y1="57"  x2="140" y2="40"  stroke="#F07840" stroke-width="5.5"/>
    <line x1="146" y1="68"  x2="160" y2="50"  stroke="#F05040" stroke-width="5.5"/>
  </g>

  <!-- === Hémisphère gauche (teal-vert) === -->
  <path
    d="M102 65
       C  94 57,  76 54,  68 59
       C  56 66,  50 78,  50 90
       C  50 102,  54 112,  62 119
       C  64 121,  68 123,  72 124
       C  72 131,  73 138,  79 142
       C  84 146,  90 144,  93 139
       C  95 144,  99 148, 102 148"
    stroke="#4EC9A4" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- === Hémisphère droit (orange-corail) === -->
  <path
    d="M102 65
       C 110 57, 128 54, 136 59
       C 148 66, 154 78, 154 90
       C 154 102, 150 112, 142 119
       C 140 121, 136 123, 132 124
       C 132 131, 131 138, 125 142
       C 120 146, 114 144, 111 139
       C 109 144, 105 148, 102 148"
    stroke="#F59040" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- === Ligne centrale (séparateur) === -->
  <line x1="102" y1="65" x2="102" y2="148"
        stroke="#c8ddd8" stroke-width="2.5" stroke-dasharray="4 4"/>

  <!-- === Visage : yeux fermés (arcs souriant) === -->
  <path d="M78 107 Q86 101 93 107"
        stroke="#2B3A58" stroke-width="5.5" stroke-linecap="round" fill="none"/>
  <path d="M111 107 Q118 101 126 107"
        stroke="#2B3A58" stroke-width="5.5" stroke-linecap="round" fill="none"/>

  <!-- === Visage : sourire === -->
  <path d="M78 120 Q102 141 126 120"
        stroke="#2B3A58" stroke-width="5.5" stroke-linecap="round" fill="none"/>

</svg>
